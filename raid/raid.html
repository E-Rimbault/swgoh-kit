<!DOCTYPE HTML>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SWGOH Database - Raids Holocron</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --sw-bg-dark: #050505;
      --sw-bg-card: #121212;
      --sw-border: #333;
      --sw-text-main: #e0e0e0;
      --sw-text-muted: #aaaaaa;
      --sw-blue-glow: rgba(0, 115, 255, 0.6);
      --sw-blue-text: #00a2ff;
      --font-titles: 'Orbitron', sans-serif;
      --font-body: 'Roboto', sans-serif;
      --sidebar-width: 380px;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--sw-bg-dark);
      background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
      color: var(--sw-text-main);
      margin: 0;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, h5, .card-title { font-family: var(--font-titles); letter-spacing: 1px; }

    #sidebar {
      position: fixed; top: 0; left: 0; height: 100vh; width: var(--sidebar-width);
      background-color: rgba(10, 10, 10, 0.95); backdrop-filter: blur(5px);
      padding: 25px; overflow-y: auto; border-right: 2px solid var(--sw-border);
      z-index: 1000;
    }

    #content {
      margin-left: var(--sidebar-width);
      padding: 30px; min-height: 100vh;
    }

    #results {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px;
    }

    .card {
      background-color: var(--sw-bg-card); border: 1px solid #222; border-radius: 12px;
      transition: all 0.3s; height: 100%; display: flex; flex-direction: column; overflow: hidden;
    }

    .card:hover {
      transform: translateY(-8px); border-color: var(--sw-blue-text);
      box-shadow: 0 5px 25px rgba(0, 162, 255, 0.4);
    }

    .card-img-container {
      width: 100%; 
      height: 200px; 
      background: radial-gradient(circle, #1a1a1a 0%, #000 100%); 
      display: flex; 
      align-items: center; 
      justify-content: center;
      padding: 10px;
    }

    .card img { 
      max-width: 100%; 
      max-height: 100%; 
      object-fit: contain;
      transition: 0.5s; 
    }
    
    .card:hover img { transform: scale(1.05); }

    .card-body { padding: 20px; flex-grow: 1; text-align: center; }
    .card-title { font-size: 1.1rem; color: #fff; margin-bottom: 15px; text-transform: uppercase; }

    .btn-raid {
      background: transparent; border: 1px solid var(--sw-blue-text); color: var(--sw-blue-text);
      font-family: var(--font-titles); font-size: 0.85rem; padding: 10px; width: 100%;
      text-decoration: none; display: inline-block; transition: 0.3s;
    }

    .btn-raid:hover { background: var(--sw-blue-text); color: #000; box-shadow: 0 0 15px var(--sw-blue-glow); }

    .lang-toggle { display:flex; justify-content:center; gap:15px; margin-bottom:30px; }
    .lang-toggle img { cursor:pointer; width:30px; height:30px; border-radius:50%; opacity: 0.4; transition: 0.3s; }
    .lang-toggle img.active { opacity: 1; border: 2px solid var(--sw-blue-text); }

    #filter-title { font-family: var(--font-titles); color: var(--sw-blue-text); font-size: 1.2rem; margin-bottom: 20px; text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px;}

    @media (max-width: 992px) {
        #sidebar { position: relative; width: 100%; height: auto; border-right: none; border-bottom: 2px solid var(--sw-border); }
        #content { margin-left: 0; }
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <div id="filter-title">RAIDS HOLOCRON</div>

    <div class="lang-toggle">
      <img src="https://flagcdn.com/us.svg" alt="English" id="lang-en">
      <img src="https://flagcdn.com/fr.svg" alt="Français" id="lang-fr">
    </div>

    <p id="sidebar-desc" style="font-size: 0.9rem; color: var(--sw-text-muted); text-align: center;">
        Select a raid to see eligible units and rewards.
    </p>

    <button id="btn-home" class="btn btn-outline-info w-100 mt-4" onclick="window.location.href='../index.html'">🏠 HOME MENU</button>
  </div>

  <div id="content">
    <div class="d-flex justify-content-between align-items-center border-bottom border-secondary pb-2 mb-4">
        <h4 id="results-label" class="m-0">AVAILABLE RAIDS</h4>
    </div>

    <div id="results"></div>
  </div>

  <script>
    let currentLang = sessionStorage.getItem("selectedLanguage") || "en";

    const raids = [
        {
            id: 1,
            name: { en: "Krayt Dragon Hunt", fr: "Chasse au Dragon Krayt" },
            image: "https://e-rimbault.github.io/swgoh-kit/raid-image/raid-dragon.png",
            url: "krayt.html"
        },
        {
            id: 2,
            name: { en: "Speeder Bike Pursuit", fr: "Poursuite en Motojet" },
            image: "https://game-assets.swgoh.gg/textures/tex.guild_events_speederbike.png",
            url: "speederbike.html"
        },
        {
            id: 3,
            name: { en: "Battle for Naboo", fr: "Bataille pour Naboo" },
            image: "https://e-rimbault.github.io/swgoh-kit/raid-image/raid-naboo.png",
            url: "naboo.html"
        },
        {
            id: 4,
            name: { en: "Order 66", fr: "Ordre 66" },
            image: "https://e-rimbault.github.io/swgoh-kit/raid-image/raid-order66.png",
            url: "order66.html"
        }
    ];

    function renderRaids() {
        const container = document.getElementById("results");
        const isFr = (currentLang === "fr");
        
        // Traductions Interface Sidebar et Content
        document.getElementById("filter-title").textContent = isFr ? "HOLOCRON DES RAIDS" : "RAIDS HOLOCRON";
        document.getElementById("results-label").textContent = isFr ? "RAIDS DISPONIBLES" : "AVAILABLE RAIDS";
        
        // TRADUCTION DES TEXTES MANQUANTS
        document.getElementById("sidebar-desc").textContent = isFr 
            ? "Sélectionnez un raid pour voir les unités éligibles et les récompenses." 
            : "Select a raid to see eligible units and rewards.";
        
        document.getElementById("btn-home").innerHTML = isFr 
            ? "🏠 MENU PRINCIPAL" 
            : "🏠 HOME MENU";

        container.innerHTML = raids.map(r => `
            <div class="card">
                <div class="card-img-container">
                    <img src="${r.image}" alt="${r.name.en}">
                </div>
                <div class="card-body">
                    <h5 class="card-title">${r.name[currentLang]}</h5>
                    <a href="${r.url}" class="btn-raid">
                        ${isFr ? 'ACCÉDER AU RAID' : 'ACCESS RAID'}
                    </a>
                </div>
            </div>
        `).join("");
        
        syncLangUI();
    }

    function syncLangUI() {
        document.querySelectorAll(".lang-toggle img").forEach(i => {
            i.classList.remove("active");
            if (i.id === "lang-" + currentLang) i.classList.add("active");
        });
    }

    document.getElementById("lang-en").onclick = () => { currentLang = "en"; sessionStorage.setItem("selectedLanguage", "en"); renderRaids(); };
    document.getElementById("lang-fr").onclick = () => { currentLang = "fr"; sessionStorage.setItem("selectedLanguage", "fr"); renderRaids(); };

    renderRaids();
  </script>
</body>
</html>
