    <footer>
        <button onclick="scrollToTop()" id="scrollBtn" title="Go to top">Top</button>
        <script src="../javascript/bouton.js"></script>

        <!-- SCRIPT DE TRADUCTION -->
        <script>
            // Dictionnaire français
            const translationsFr = {
                "big-title": "",
                "title": "<u></u>",
                "description": "",

                "ultime-title": "<u>Capacité Ultime: <u>",
                "ulti": "",

                "basic-attack-title": "<u>Attaque Basique: </u>",
                "basic-attack": "",

                "special-attack1-title": "<u>Attaque Spéciale : (délai : )</u>",
                "special-attack1": "",

                "special-attack2-title": "<u>Attaque Spéciale : (délai : )</u>",
                "special-attack2": "",

                "lead-ability-title": "<u>Capacité de Chef: </u>",
                "lead-ability": "",

                "unique-ability-title": "<u>Capacité Unique : </u>",
                "unique-ability": "",

                "prime-title": "",
                "prime": "",

                "ship-title": "<u>Vaisseau : </u>",

                "invocation-title": "<u>Invocation :</u> "
            };

            const originalTexts = {};
            let eraDataGlobal = null;
            let raidDataGlobal = null; // ✨ NOUVEAU : Contiendra l'objet du raid {en: '...', fr: '...'}

            function saveOriginalTexts() {
                for (const id in translationsFr) {
                    const el = document.getElementById(id);
                    if (el) originalTexts[id] = el.innerHTML;
                }
            }

            function replaceNewLinesWithBr(text) {
                return text.replace(/\n\s*\n/g, '<br><br>').replace(/([^\n])\n([^\n])/g, '$1<br>$2');
            }

            function switchLanguageTo(lang) {
                sessionStorage.setItem("selectedLanguage", lang);

                if (lang === "fr") {
                    for (const [id, text] of Object.entries(translationsFr)) {
                        const el = document.getElementById(id);
                        if (el) el.innerHTML = replaceNewLinesWithBr(text);
                    }
                } else {
                    for (const [id, text] of Object.entries(originalTexts)) {
                        const el = document.getElementById(id);
                        if (el) el.innerHTML = text;
                    }
                }

                // Traduction en direct du bouton de l'Ère
                const eraLink = document.getElementById('unit-era');
                if (eraLink && eraDataGlobal) {
                    eraLink.innerText = lang === "fr" ? eraDataGlobal.fr : eraDataGlobal.en;
                }

                // ✨ NOUVEAU : Traduction en direct du bouton du Raid
                const raidLink = document.getElementById('unit-raid');
                if (raidLink && raidDataGlobal) {
                    raidLink.innerText = lang === "fr" ? raidDataGlobal.fr : raidDataGlobal.en;
                }

                updateFlagActive();
            }

            function updateFlagActive() {
                const lang = sessionStorage.getItem("selectedLanguage") || "en";
                document.getElementById("lang-en").style.borderColor = lang === "en" ? "#007bff" : "transparent";
                document.getElementById("lang-fr").style.borderColor = lang === "fr" ? "#007bff" : "transparent";
            }

            function loadUnitEraData() {
                const params = new URLSearchParams(window.location.search);
                const unitId = params.get('id') || ""; //filtre unité ici

                fetch('https://e-rimbault.github.io/swgoh-kit/filtre-recherche/units.json')
                    .then(response => response.json())
                    .then(data => {
                        const currentUnit = data.find(u => u.id === unitId);
                        const eraLink = document.getElementById('unit-era');
                        const raidLink = document.getElementById('unit-raid'); // ✨ NOUVEAU

                        if (currentUnit) {
                            // Gestion de l'ère
                            if (currentUnit.era) {
                                eraDataGlobal = currentUnit.era;
                                eraLink.href = `../classement-perso/era.html?name=${encodeURIComponent(currentUnit.era.en)}`;
                                const currentLang = sessionStorage.getItem("selectedLanguage") || "en";
                                eraLink.innerText = currentLang === "fr" ? currentUnit.era.fr : currentUnit.era.en;
                            } else {
                                eraLink.style.display = 'none';
                            }

                            // ✨ NOUVEAU : Gestion du Raid (prend le premier raid du tableau s'il y en a un)
                            if (currentUnit.raids && currentUnit.raids.length > 0) {
                                raidDataGlobal = currentUnit.raids[0]; // On récupère le premier raid associé

                                // On envoie le nom EN dans l'url pour la page dynamique raid.html
                                raidLink.href = `../classement-perso/raid.html?name=${encodeURIComponent(raidDataGlobal.en)}`;

                                const currentLang = sessionStorage.getItem("selectedLanguage") || "en";
                                raidLink.innerText = currentLang === "fr" ? raidDataGlobal.fr : raidDataGlobal.en;
                            } else {
                                raidLink.style.display = 'none'; // Masque le bouton s'il n'y a pas de raid
                            }
                        }
                    })
                    .catch(err => {
                        console.error("Erreur lors du chargement des données JSON :", err);
                        document.getElementById('unit-era').style.display = 'none';
                        document.getElementById('unit-raid').style.display = 'none';
                    });
            }

            window.addEventListener("load", () => {
                saveOriginalTexts();
                loadUnitEraData();
                switchLanguageTo(sessionStorage.getItem("selectedLanguage") || "en");
                document.getElementById("lang-fr").onclick = () => switchLanguageTo("fr");
                document.getElementById("lang-en").onclick = () => switchLanguageTo("en");
            });
        </script>
    </footer>

</body>
