        <button onclick="scrollToTop()" id="scrollBtn" title="Go to top">Top</button>
        <script src="../javascript/bouton.js"></script>

        <!-- SCRIPT DE TRADUCTION -->
        <script>
            // Dictionnaire français
            const translationsFr = {
                "big-title": "",
                "title": "<u></u>",
                "description": "",

                "ultime-title": "<u>Capacité Ultime: <u>",
                "ulti": "",

                "basic-attack-title": "<u>Attaque Basique: </u>",
                "basic-attack": "",

                "special-attack1-title": "<u>Attaque Spéciale : (délai : )</u>",
                "special-attack1": "",

                "special-attack2-title": "<u>Attaque Spéciale : (délai : )</u>",
                "special-attack2": "",

                "lead-ability-title": "<u>Capacité de Chef: </u>",
                "lead-ability": "",

                "unique-ability-title": "<u>Capacité Unique : </u>",
                "unique-ability": "",

                "prime-title": "",
                "prime": "",

                "ship-title": "<u>Vaisseau : </u>",

                "invocation-title": "<u>Invocation :</u> "
            };

            const originalTexts = {};
            let eraDataGlobal = null;
            let raidsDataGlobal = [];

            function saveOriginalTexts() {
                for (const id in translationsFr) {
                    const el = document.getElementById(id);
                    if (el) originalTexts[id] = el.innerHTML;
                }
            }

            function replaceNewLinesWithBr(text) {
                return text.replace(/\n\s*\n/g, '<br><br>').replace(/([^\n])\n([^\n])/g, '$1<br>$2');
            }

            function switchLanguageTo(lang) {
                sessionStorage.setItem("selectedLanguage", lang);

                if (lang === "fr") {
                    for (const [id, text] of Object.entries(translationsFr)) {
                        const el = document.getElementById(id);
                        if (el) el.innerHTML = replaceNewLinesWithBr(text);
                    }
                } else {
                    for (const [id, text] of Object.entries(originalTexts)) {
                        const el = document.getElementById(id);
                        if (el) el.innerHTML = text;
                    }
                }

                // Traduction en direct du bouton de l'Ère
                const eraLink = document.getElementById('unit-era');
                if (eraLink && eraDataGlobal) {
                    eraLink.innerText = lang === "fr" ? eraDataGlobal.fr : eraDataGlobal.en;
                }

                // Traduction en direct de TOUS les boutons de raids générés
                raidsDataGlobal.forEach((raid, index) => {
                    const raidLink = document.getElementById(`unit-raid-${index}`);
                    if (raidLink) {
                        raidLink.innerText = lang === "fr" ? raid.fr : raid.en;
                    }
                });

                updateFlagActive();
            }

            function updateFlagActive() {
                const lang = sessionStorage.getItem("selectedLanguage") || "en";
                if (document.getElementById("lang-en")) document.getElementById("lang-en").style.borderColor = lang === "en" ? "#007bff" : "transparent";
                if (document.getElementById("lang-fr")) document.getElementById("lang-fr").style.borderColor = lang === "fr" ? "#007bff" : "transparent";
            }

            function loadUnitEraData() {
                const params = new URLSearchParams(window.location.search);
                const unitId = params.get('id') || ""; //filtre unité ici

                // On retourne le fetch pour pouvoir utiliser un .then() dans l'écouteur d'événement principal
                return fetch('https://e-rimbault.github.io/swgoh-kit/filtre-recherche/units.json')
                    .then(response => response.json())
                    .then(data => {
                        const currentUnit = data.find(u => u.id === unitId);
                        const eraLink = document.getElementById('unit-era');
                        const raidsContainer = document.getElementById('raids-container');

                        if (currentUnit) {
                            // Gestion de l'ère
                            if (currentUnit.era) {
                                eraDataGlobal = currentUnit.era;
                                eraLink.href = `../classement-perso/era.html?name=${encodeURIComponent(currentUnit.era.en)}`;
                                eraLink.style.display = 'inline-block';
                            }

                            // Gestion dynamique des Raids multiples
                            if (currentUnit.raids && currentUnit.raids.length > 0) {
                                raidsDataGlobal = currentUnit.raids;
                                raidsContainer.innerHTML = ""; 

                                currentUnit.raids.forEach((raid, index) => {
                                    const newRaidLink = document.createElement('a');
                                    newRaidLink.id = `unit-raid-${index}`;
                                    newRaidLink.className = 'raid';
                                    newRaidLink.href = `../classement-perso/raid.html?name=${encodeURIComponent(raid.en)}`;
                                    
                                    newRaidLink.style.backgroundColor = 'orange';
                                    newRaidLink.style.color = 'white';
                                    newRaidLink.style.textDecoration = 'none';
                                    newRaidLink.style.padding = '2px 8px';
                                    newRaidLink.style.borderRadius = '4px';

                                    raidsContainer.appendChild(newRaidLink);
                                });
                            }
                        }
                    })
                    .catch(err => {
                        console.error("Erreur lors du chargement des données JSON :", err);
                    });
            }

            // ✨ Modification de l'ordre d'exécution ici
            window.addEventListener("load", () => {
                saveOriginalTexts(); // 1. Sauvegarde l'anglais de base
                
                loadUnitEraData().then(() => { 
                    // 2. ATTEND que le JSON soit chargé et que les boutons soient créés
                    // 3. Applique enfin la langue (Français ou Anglais) sur TOUS les éléments d'un coup
                    switchLanguageTo(sessionStorage.getItem("selectedLanguage") || "en");
                });

                document.getElementById("lang-fr").onclick = () => switchLanguageTo("fr");
                document.getElementById("lang-en").onclick = () => switchLanguageTo("en");
            });
            </script>
    </footer>
</body>
