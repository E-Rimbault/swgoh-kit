<!DOCTYPE HTML>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title id="big-title">SWGOH - Raid Name</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --sw-bg-dark: #050505;
            --sw-bg-card: #121212;
            --sw-border: #333;
            --sw-text-main: #e0e0e0;
            --sw-blue-text: #00a2ff;
            --font-titles: 'Orbitron', sans-serif;
            --sidebar-width: 380px;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--sw-bg-dark);
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            color: var(--sw-text-main);
            margin: 0;
            overflow-x: hidden;
        }

        #sidebar {
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            width: var(--sidebar-width);
            background-color: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(5px);
            padding: 25px;
            border-right: 2px solid var(--sw-border);
            z-index: 1000;
            overflow-y: auto;
        }

        #content {
            margin-left: var(--sidebar-width);
            padding: 40px;
            min-height: 100vh;
        }

        .raid-header-img {
            width: 100%;
            height: auto;
            max-height: 300px;
            object-fit: contain;
            background: #000;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid var(--sw-border);
            display: block;
        }

        .main-raid-title {
            font-family: var(--font-titles);
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            border-left: 5px solid var(--sw-blue-text);
            padding-left: 15px;
        }

        .nav-section { margin-bottom: 20px; }
        .nav-title {
            font-family: var(--font-titles);
            color: var(--sw-blue-text);
            font-size: 0.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            border-bottom: 1px solid #222;
        }

        .nav-item {
            display: block;
            padding: 12px 15px;
            color: #aaa;
            text-decoration: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item:hover { background: rgba(0, 162, 255, 0.1); color: #fff; }
        .nav-item.active { background: var(--sw-blue-text); color: #000; font-weight: bold; }
        .sub-item { padding-left: 35px; font-size: 0.9rem; }

        .section-content { display: none; animation: fadeIn 0.4s ease-out; }
        .section-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #units-gallery {
            display: flex; flex-wrap: wrap; gap: 12px;
            justify-content: center; padding: 20px;
            background: rgba(255, 255, 255, 0.03); border-radius: 15px;
        }

        .raid-unit-img {
            width: 100px; height: 100px; object-fit: contain;
            border-radius: 10px; border: 2px solid var(--sw-border);
            background-color: #000; transition: 0.3s;
        }

        .raid-unit-card:hover .raid-unit-img {
            transform: scale(1.1); border-color: var(--sw-blue-text);
            box-shadow: 0 0 15px rgba(0, 162, 255, 0.5);
        }

        .lang-toggle { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .lang-toggle img {
            cursor: pointer; width: 25px; opacity: 0.4;
            transition: 0.3s; border: 2px solid transparent; border-radius: 4px;
        }
        .lang-toggle img.active { opacity: 1; border-color: var(--sw-blue-text); }

        .info-box {
            background: var(--sw-bg-card); padding: 25px;
            border-radius: 12px; border: 1px solid var(--sw-border); line-height: 1.7;
        }

        h2 { font-family: var(--font-titles); color: var(--sw-blue-text); margin-bottom: 20px; font-size: 1.4rem; }

        @media (max-width: 992px) {
            #sidebar { position: relative; width: 100%; height: auto; border-right: none; }
            #content { margin-left: 0; }
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <div class="lang-toggle">
            <img src="https://flagcdn.com/us.svg" alt="EN" id="lang-en" onclick="switchLanguage('en')">
            <img src="https://flagcdn.com/fr.svg" alt="FR" id="lang-fr" onclick="switchLanguage('fr')">
        </div>

        <!-- IMAGE DU RAID -->
        <img src="../raid-image/VOTRE_IMAGE.png" class="raid-header-img" alt="Raid Boss">

        <div class="nav-section">
            <div class="nav-title" id="title-resume">Summary</div>
            <div id="btn-history" class="nav-item active" onclick="showSection('resume', this)">Story & Rules</div>
        </div>

        <div class="nav-section">
            <div class="nav-title" id="title-details">Details</div>
            <div id="btn-apercu" class="nav-item" onclick="showSection('apercu', this)">Overview</div>
            <div id="btn-finale" class="nav-item sub-item" onclick="showSection('phase-finale', this)">Final Phase</div>
        </div>

        <div class="nav-section">
            <div class="nav-title" id="title-restrict">Restrictions</div>
            <div id="btn-unites" class="nav-item" onclick="showSection('unites', this)">Eligible Units</div>
        </div>

        <button class="btn btn-outline-info w-100 mt-4" onclick="window.location.href='raid.html'" id="btn-back">BACK</button>
    </div>

    <div id="content">
        <h1 class="main-raid-title" id="raid-main-name">Raid Name</h1>

        <!-- Section Histoire -->
        <div id="section-resume" class="section-content active">
            <h2 id="h-history">Story & Rules</h2>
            <div class="info-box" id="text-history">Description in English...</div>
        </div>

        <!-- Section Aperçu -->
        <div id="section-apercu" class="section-content">
            <h2 id="h-apercu">Raid Overview</h2>
            <div class="info-box" id="text-apercu">English overview details...</div>
        </div>

        <!-- Section Phase Finale -->
        <div id="section-phase-finale" class="section-content">
            <h2 id="h-finale">Final Phase</h2>
            <div class="info-box" id="text-finale">English final phase details...</div>
        </div>

        <!-- Section Unités -->
        <div id="section-unites" class="section-content">
            <h2 id="h-unites">Eligible Units</h2>
            <!-- Input de recherche (optionnel mais recommandé) -->
            <input type="text" id="searchInput" class="form-control mb-3 bg-dark text-light border-secondary" placeholder="Search unit..." onkeyup="renderUnits()">
            <div id="units-gallery"></div>
        </div>
    </div>

    <script>
        let currentLang = sessionStorage.getItem("selectedLanguage") || "en";
        let allUnits = [];
        
        // --- À CONFIGURER POUR CHAQUE PAGE ---
        const RAID_TARGET_EN = "raid name in json"; // Doit correspondre exactement au texte dans ton units.json

        const dictFr = {
            "big-title": "SWGOH - Nom du Raid",
            "raid-main-name": "Nom du Raid",
            "title-resume": "Résumé",
            "btn-history": "Histoire & Règles",
            "title-details": "Détails",
            "btn-apercu": "Aperçu",
            "btn-finale": "Phase Finale",
            "title-restrict": "Restrictions",
            "btn-unites": "Unités autorisées",
            "btn-back": "RETOUR",
            "h-history": "Histoire & Règles",
            "h-apercu": "Aperçu du Raid",
            "h-finale": "Phase Finale",
            "h-unites": "Unités autorisées",
            "text-history": "Texte de l'histoire en français...",
            "text-apercu": "Texte de l'aperçu en français...",
            "text-finale": "Texte de la phase finale en français...",
            "search-placeholder": "Rechercher une unité..."
        };

        const englishTexts = {};

        function normalize(str) {
            return str ? str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim() : '';
        }

        window.addEventListener("DOMContentLoaded", () => {
            // Sauvegarde automatique des textes anglais
            for (let id in dictFr) {
                const el = document.getElementById(id);
                if (el) {
                    englishTexts[id] = (id === "searchInput") ? el.placeholder : el.innerText;
                }
            }

            fetch("https://e-rimbault.github.io/swgoh-kit/filtre-recherche/units.json")
                .then(res => res.json())
                .then(data => {
                    allUnits = data;
                    updateUI();
                });
        });

        function switchLanguage(lang) {
            currentLang = lang;
            sessionStorage.setItem("selectedLanguage", lang);
            updateUI();
        }

        function updateUI() {
            const isFr = (currentLang === "fr");
            const source = isFr ? dictFr : englishTexts;

            for (let id in dictFr) {
                const el = document.getElementById(id);
                if (el) {
                    if (id === "searchInput") {
                        el.placeholder = isFr ? dictFr["search-placeholder"] : englishTexts["search-placeholder"];
                    } else if (id === "big-title") {
                        document.title = source[id];
                    } else {
                        el.innerText = source[id];
                    }
                }
            }

            document.getElementById("lang-en").classList.toggle("active", currentLang === 'en');
            document.getElementById("lang-fr").classList.toggle("active", currentLang === 'fr');

            renderUnits();
        }

        function showSection(sectionId, element) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('section-' + sectionId).classList.add('active');
            element.classList.add('active');
        }

        function renderUnits() {
            const gallery = document.getElementById("units-gallery");
            const searchVal = document.getElementById("searchInput") ? document.getElementById("searchInput").value : "";
            const search = normalize(searchVal);
            if (!gallery) return;
            gallery.innerHTML = "";

            const filtered = allUnits.filter(u => {
                const hasRaid = u.raids && u.raids.some(r => normalize(r.en) === normalize(RAID_TARGET_EN));
                const nameMatch = normalize(u.name[currentLang] || u.name.en).includes(search);
                return hasRaid && nameMatch;
            });

            filtered.forEach(u => {
                const anchor = document.createElement("a");
                anchor.href = u.page || "#";
                anchor.className = "raid-unit-card";
                anchor.title = u.name[currentLang] || u.name.en;

                const img = document.createElement("img");
                img.src = u.image;
                img.className = "raid-unit-img";
                img.onerror = function () { this.src = 'https://e-rimbault.github.io/swgoh-kit/image/logo_star_wars.png'; };

                anchor.appendChild(img);
                gallery.appendChild(anchor);
            });

            if (filtered.length === 0) {
                gallery.innerHTML = `<p class='text-center w-100 opacity-50 mt-4'>${currentLang === 'fr' ? 'Aucune unité trouvée.' : 'No units found.'}</p>`;
            }
        }
    </script>
</body>
</html>
