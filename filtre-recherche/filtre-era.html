<!DOCTYPE HTML>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>SWGOH Database - Eras Holocron</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --sw-bg-dark: #050505;
      --sw-bg-card: #121212;
      --sw-border: #333;
      --sw-text-main: #e0e0e0;
      --sw-text-muted: #aaaaaa;
      --sw-blue-glow: rgba(0, 115, 255, 0.6);
      --sw-blue-text: #00a2ff;
      --font-titles: 'Orbitron', sans-serif;
      --font-body: 'Roboto', sans-serif;
      --sidebar-width: 380px;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--sw-bg-dark);
      background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
      color: var(--sw-text-main);
      margin: 0;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, h5, .card-title, .era-header-title {
      font-family: var(--font-titles);
      letter-spacing: 1px;
    }

    /* Layout */
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: var(--sidebar-width);
      background-color: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(5px);
      padding: 25px;
      overflow-y: auto;
      border-right: 2px solid var(--sw-border);
      z-index: 1000;
      transition: transform 0.3s ease;
    }

    #content {
      margin-left: var(--sidebar-width);
      padding: 30px;
      min-height: 100vh;
    }

    .filter-box {
      background: rgba(255, 255, 255, 0.03);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px solid #222;
    }

    .filter-box h5 {
      font-size: 0.85rem;
      text-transform: uppercase;
      color: var(--sw-blue-text);
      margin-bottom: 15px;
      border-bottom: 1px solid #333;
      padding-bottom: 5px;
    }

    /* Barre de recherche personnalisée */
    .search-input {
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid var(--sw-border);
      color: #fff;
      font-size: 0.9rem;
      border-radius: 6px;
      padding: 10px;
      transition: all 0.3s;
    }

    .search-input:focus {
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      border-color: var(--sw-blue-text);
      box-shadow: 0 0 8px var(--sw-blue-glow);
      outline: none;
    }

    /* Sections des Ères */
    .era-section {
      background: rgba(20, 20, 20, 0.6);
      border: 1px solid var(--sw-border);
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 40px;
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
    }

    .era-header {
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 2px solid #222;
      padding-bottom: 15px;
      margin-bottom: 25px;
    }

    .era-header img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      filter: drop-shadow(0 0 5px rgba(0, 162, 255, 0.4));
    }

    .era-header-title {
      font-size: 1.5rem;
      color: #fff;
      margin: 0;
      text-shadow: 0 0 10px rgba(0, 162, 255, 0.3);
    }

    /* Grille d'unités */
    .units-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    /* Cartes */
    .card {
      background-color: var(--sw-bg-card);
      border: 1px solid #222;
      border-radius: 8px;
      transition: all 0.3s;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: var(--sw-blue-text);
      box-shadow: 0 5px 20px rgba(0, 162, 255, 0.3);
    }

    .card-img-container {
      width: 100%;
      height: 150px;
      background: radial-gradient(circle, #2a2a2a 0%, #121212 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .card img {
      max-width: 85%;
      max-height: 100%;
      object-fit: contain;
    }

    .card-body {
      padding: 15px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-size: 0.95rem;
      color: #fff;
      margin-bottom: 12px;
      text-align: center;
      border-bottom: 1px solid #333;
      padding-bottom: 8px;
    }

    .card-text {
      font-size: 0.8rem;
      color: var(--sw-text-muted);
      flex-grow: 1;
      line-height: 1.4;
    }

    .unit-label {
      color: var(--sw-blue-text);
      font-weight: bold;
      font-size: 0.72rem;
      text-transform: uppercase;
    }

    .btn-primary {
      background: transparent;
      border: 1px solid var(--sw-blue-text);
      color: var(--sw-blue-text);
      font-family: var(--font-titles);
      font-size: 0.75rem;
      margin-top: 15px;
      width: 100%;
    }

    .btn-primary:hover {
      background: var(--sw-blue-text);
      color: #000;
      box-shadow: 0 0 10px var(--sw-blue-glow);
    }

    /* Liens rapides */
    .era-link-item {
      display: block;
      background: #1a1a1a;
      color: var(--sw-text-main);
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 6px;
      text-decoration: none;
      font-size: 0.85rem;
      transition: 0.2s;
      border-left: 3px solid transparent;
    }

    .era-link-item:hover {
      background: #252525;
      color: var(--sw-blue-text);
      border-left-color: var(--sw-blue-text);
      padding-left: 16px;
    }

    /* CLASSE DE SURBRILLANCE POUR LE SUIVI DE DÉFILEMENT (Scrollspy) */
    .era-link-item.active-era {
      background: rgba(0, 162, 255, 0.15);
      color: var(--sw-blue-text);
      border-left-color: var(--sw-blue-text);
      box-shadow: 0 0 10px rgba(0, 162, 255, 0.2);
      font-weight: bold;
    }

    #scrollTopBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      display: none;
      background: var(--sw-blue-text);
      color: black;
      border: none;
      border-radius: 50%;
      width: 45px;
      height: 45px;
      font-weight: bold;
      cursor: pointer;
    }

    #mobile-nav-toggle {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1001;
      background: var(--sw-blue-text);
      color: #000;
      border: none;
      padding: 10px 25px;
      border-radius: 30px;
      font-weight: bold;
      font-family: var(--font-titles);
    }

    /* Langue & Navigation */
    .lang-toggle {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .lang-toggle img {
      cursor: pointer;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      opacity: 0.4;
      transition: 0.3s;
    }

    .lang-toggle img.active {
      opacity: 1;
      border: 2px solid var(--sw-blue-text);
    }

    @media (max-width: 992px) {
      #sidebar {
        left: -100%;
        width: 320px;
      }

      #sidebar.open {
        transform: translateX(100%);
      }

      #content {
        margin-left: 0;
      }

      #mobile-nav-toggle {
        display: block;
      }
    }
  </style>
</head>

<body>

  <button id="mobile-nav-toggle">🧭 NAVIGATION</button>
  <button id="scrollTopBtn">↑</button>

  <div id="sidebar">
    <div id="filter-title" style="font-family: var(--font-titles); letter-spacing: 1px; margin-bottom: 15px; text-align: center; color: #fff; font-weight: bold;">ERA HOLOCRON</div>

    <div class="lang-toggle">
      <img src="https://flagcdn.com/us.svg" alt="English" id="lang-en">
      <img src="https://flagcdn.com/fr.svg" alt="Français" id="lang-fr">
    </div>

    <div class="mb-3">
      <input type="text" id="search-input" class="form-control search-input" placeholder="Search a unit, role...">
    </div>

    <div class="filter-box">
      <h5 id="title-navigation">GALACTIC ERAS</h5>
      <div id="eras-quick-links" style="max-height: 450px; overflow-y: auto; padding-right: 5px;"></div>
    </div>

    <button id="home-btn" class="btn btn-outline-info w-100" onclick="window.location.href='../index.html'">🏠 HOME MENU</button>
  </div>

  <div id="content">
    <div class="d-flex justify-content-between align-items-center border-bottom border-secondary pb-2 mb-4">
      <h4 id="results-label" class="m-0">ERAS TIMELINE</h4>
      <span id="era-count" class="badge bg-info text-dark">0 Eras</span>
    </div>

    <div id="eras-container">
      <p class="text-center text-muted">Accessing Data-tapes from the Archive...</p>
    </div>
  </div>

  <script>
    let characters = [];
    let eras = [];
    let currentLang = sessionStorage.getItem("selectedLanguage") || "en";

    const defaultUnitImage = "https://e-rimbault.github.io/swgoh-kit/image/logo_star_wars.png";

    async function loadJsonData(primaryUrl, localFallbackUrl) {
      try {
        const response = await fetch(primaryUrl);
        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
        return await response.json();
      } catch (error) {
        console.warn(`Failed loading primary URL (${primaryUrl}), trying fallback:`, error);
        const fallbackResponse = await fetch(localFallbackUrl);
        return await fallbackResponse.json();
      }
    }

    async function initDatabase() {
      const unitsPrimary = "https://e-rimbault.github.io/swgoh-kit/filtre-recherche/units.json";
      const erasPrimary = "https://e-rimbault.github.io/swgoh-kit/filtre-recherche/eras.json";

      try {
        const [unitsData, erasData] = await Promise.all([
          loadJsonData(unitsPrimary, "units.json"),
          loadJsonData(erasPrimary, "eras.json")
        ]);

        characters = unitsData || [];
        eras = erasData || [];
        
        initPage();
      } catch (criticalError) {
        console.error("Critical error loading database records:", criticalError);
        document.getElementById("eras-container").innerHTML = `
          <div class="text-center text-danger p-4">
            <h5>⚠️ Datacron Error</h5>
            <p>Unable to retrieve Holocron data maps. Please check if your JSON structures are correctly placed.</p>
          </div>
        `;
      }
    }

    function initPage() {
      syncLangUI();
      updateStaticText();
      renderTimeline();
    }

    function syncLangUI() {
      document.querySelectorAll(".lang-toggle img").forEach(i => i.classList.remove("active"));
      const activeFlag = document.getElementById("lang-" + currentLang);
      if (activeFlag) activeFlag.classList.add("active");
    }

    function updateStaticText() {
      const isFr = (currentLang === "fr");
      const elements = {
        "filter-title": isFr ? "HOLOCRON DES ÈRES" : "ERA HOLOCRON",
        "title-navigation": isFr ? "ÈRES GALACTIQUES" : "GALACTIC ERAS",
        "home-btn": isFr ? "🏠 MENU PRINCIPAL" : "🏠 HOME MENU",
        "results-label": isFr ? "CHRONOLOGIE DES ÈRES" : "ERAS TIMELINE"
      };

      for (let id in elements) {
        const el = document.getElementById(id);
        if (el) el.textContent = elements[id];
      }

      const searchInput = document.getElementById("search-input");
      if (searchInput) {
        searchInput.placeholder = isFr ? "Rechercher une unité, un rôle..." : "Search a unit, role...";
      }
    }

    function normalizeEraString(str) {
      if (!str) return "";
      return str
        .toLowerCase()
        .trim()
        .replace(/\s+/g, ' ')
        .replace(/\b(the|of|de|la|le)\b/g, '')
        .replace(/['’-]/g, '')
        .replace(/\s+/g, '')
        .trim();
    }

    function renderTimeline() {
      const isFr = (currentLang === "fr");
      const container = document.getElementById("eras-container");
      const linksContainer = document.getElementById("eras-quick-links");
      const searchQuery = document.getElementById("search-input").value.toLowerCase().trim();
      
      container.innerHTML = "";
      linksContainer.innerHTML = "";

      if (!eras || !eras.length) {
        container.innerHTML = `<p class="text-center text-muted">${isFr ? "Aucune ère trouvée" : "No eras found"}</p>`;
        return;
      }

      let activeErasCount = 0;

      const sortedEras = [...eras].sort((a, b) => {
        const numA = a.numero_ere !== undefined ? parseInt(a.numero_ere) : 0;
        const numB = b.numero_ere !== undefined ? parseInt(b.numero_ere) : 0;
        
        if (numA !== numB) {
          return numB - numA; 
        }
        
        const nameA = (isFr ? (a.name_fr || a.name_en) : (a.name_en || a.name_fr)).toLowerCase();
        const nameB = (isFr ? (b.name_fr || b.name_en) : (b.name_en || b.name_fr)).toLowerCase();
        return nameA.localeCompare(nameB);
      });

      sortedEras.forEach((era, index) => {
        const eraName = isFr ? (era.name_fr || era.name_en) : (era.name_en || era.name_fr);
        const eraTargetId = "era-" + (era.name_en ? era.name_en.toLowerCase().replace(/[^a-z0-9]/g, "-") : index);

        let eraUnits = characters.filter(c => {
          if (!c.era) return false;
          
          if (c.era.en && era.name_en) {
            if (normalizeEraString(c.era.en) === normalizeEraString(era.name_en)) return true;
          }
          
          if (c.era.fr && era.name_fr) {
            if (normalizeEraString(c.era.fr) === normalizeEraString(era.name_fr)) return true;
          }
          
          return false;
        });

        if (searchQuery !== "") {
          eraUnits = eraUnits.filter(c => {
            const name = (c.name?.[currentLang] || c.name?.en || "").toLowerCase();
            const id = (c.id || "").toLowerCase();
            const role = (c.role?.[currentLang] || c.role?.en || "").toLowerCase();
            const alignment = (c.alignment?.[currentLang] || c.alignment?.en || "").toLowerCase();
            const factions = (c.factions || []).map(f => (f[currentLang] || f.en || "").toLowerCase()).join(" ");

            return name.includes(searchQuery) || 
                   id.includes(searchQuery) || 
                   role.includes(searchQuery) || 
                   alignment.includes(searchQuery) || 
                   factions.includes(searchQuery);
          });
        }

        if (searchQuery !== "" && eraUnits.length === 0) {
          return; 
        }

        activeErasCount++;

        eraUnits.sort((a, b) => {
          const nameA = a.name?.[currentLang] || a.name?.en || "";
          const nameB = b.name?.[currentLang] || b.name?.en || "";
          return nameA.localeCompare(nameB);
        });

        // TEXTE DU LIEN DU MENU AVEC COMPTEUR DYNAMIQUE D'UNITÉS
        const link = document.createElement("a");
        link.href = `#${eraTargetId}`;
        link.className = "era-link-item text-truncate d-flex justify-content-between align-items-center";
        link.setAttribute("data-target", eraTargetId); // Utile pour le système de suivi
        
        const labelSpan = document.createElement("span");
        labelSpan.className = "text-truncate me-2";
        labelSpan.textContent = eraName;
        
        const countBadge = document.createElement("span");
        countBadge.className = "badge bg-secondary text-light rounded-pill";
        countBadge.style.fontSize = "0.7rem";
        countBadge.textContent = eraUnits.length;

        link.appendChild(labelSpan);
        link.appendChild(countBadge);
        
        link.onclick = () => { document.getElementById("sidebar").classList.remove("open"); }; 
        linksContainer.appendChild(link);

        const section = document.createElement("div");
        section.className = "era-section";
        section.id = eraTargetId;

        // AJOUT DU COMPTEUR AUSSI DANS LE TITRE DE LA SECTION POUR PLUS DE CLARTÉ
        let headerHtml = `
          <div class="era-header">
            ${era.image ? `<img src="${era.image}" alt="${eraName}" onerror="this.style.display='none'">` : ''}
            <div class="d-flex align-items-center justify-content-between w-100 flex-wrap gap-2">
              <h3 class="era-header-title m-0">${eraName}</h3>
              <span class="badge bg-dark border border-secondary text-info fs-6">${eraUnits.length} ${isFr ? 'unité(s)' : 'unit(s)'}</span>
            </div>
          </div>
        `;

        let unitsHtml = `<div class="units-grid">`;
        if (eraUnits.length > 0) {
          unitsHtml += eraUnits.map(c => {
            const fText = (c.factions || []).map(f => f ? (f[currentLang] || f.en || "") : "").filter(Boolean).join(", ");
            const alignLabel = isFr ? "Alignement" : "Alignment";
            const roleLabel = isFr ? "Rôle" : "Role";
            const yearLabel = isFr ? "Année" : "Year";
            
            const unitName = c.name ? (c.name[currentLang] || c.name.en || "---") : "---";
            const unitRole = c.role ? (c.role[currentLang] || c.role.en || "---") : "---";
            const unitAlignment = c.alignment ? (c.alignment[currentLang] || c.alignment.en || "---") : "---";

            let finalImage = (c.image || "").trim();
            if (!finalImage || finalImage === "" || finalImage.endsWith("image-perso/")) {
              finalImage = defaultUnitImage;
            }

            return `
              <div class="card">
                <div class="card-img-container">
                  <img src="${finalImage}" alt="${c.name?.en || 'Unit'}" loading="lazy" onerror="this.src='${defaultUnitImage}';">
                </div>
                <div class="card-body">
                  <h5 class="card-title">${unitName}</h5>
                  <div class="card-text">
                    <p class="mb-1"><span class="unit-label">ID:</span> ${c.id || "---"}</p>
                    <p class="mb-1"><span class="unit-label">${roleLabel}:</span> ${unitRole}</p>
                    <p class="mb-1"><span class="unit-label">${alignLabel}:</span> ${unitAlignment}</p>
                    <p class="mb-1"><span class="unit-label">Factions:</span> ${fText || "---"}</p>
                    <p class="mb-0"><span class="unit-label">${yearLabel}:</span> ${c.years_of_apparition || "---"}</p>
                  </div>
                  <button class="btn btn-primary btn-sm" onclick="window.location.href='${c.page || '#'}'">
                    ${isFr ? 'DÉTAILS' : 'DETAILS'}
                  </button>
                </div>
              </div>
            `;
          }).join("");
        } else {
          unitsHtml += `<p class="text-muted small w-100 p-2">${isFr ? "Aucune unité répertoriée pour cette ère." : "No units logged for this era yet."}</p>`;
        }
        unitsHtml += `</div>`;

        section.innerHTML = headerHtml + unitsHtml;
        container.appendChild(section);
      });

      document.getElementById("era-count").textContent = `${activeErasCount} ${isFr ? 'Ères' : 'Eras'}`;
      
      if (activeErasCount === 0) {
        container.innerHTML = `<p class="text-center text-muted p-4">${isFr ? "Aucun résultat pour votre recherche." : "No results match your search."}</p>`;
      }

      // Lancer le calcul de la surbrillance immédiatement après le rendu de la timeline
      spyScroll();
    }

    // FONCTION DE SUIVI DÉNAMIQUE DU DÉFILEMENT (SCROLLSPY)
    function spyScroll() {
      const sections = document.querySelectorAll(".era-section");
      const navLinks = document.querySelectorAll("#eras-quick-links .era-link-item");
      
      let currentSectionId = "";
      
      sections.forEach(section => {
        const sectionTop = section.offsetTop;
        // On considère l'ère active si le scroll a dépassé le haut de l'ère (avec une marge de 100px pour le confort visuel)
        if (window.scrollY >= sectionTop - 100) {
          currentSectionId = section.id;
        }
      });

      navLinks.forEach(link => {
        link.classList.remove("active-era");
        if (link.getAttribute("data-target") === currentSectionId) {
          link.classList.add("active-era");
        }
      });
    }

    document.getElementById("search-input").oninput = () => {
      renderTimeline();
    };

    document.getElementById("lang-en").onclick = () => { currentLang = "en"; updateLangUI("en"); };
    document.getElementById("lang-fr").onclick = () => { currentLang = "fr"; updateLangUI("fr"); };

    function updateLangUI(l) {
      sessionStorage.setItem("selectedLanguage", l);
      syncLangUI();
      initPage();
    }

    document.getElementById("mobile-nav-toggle").onclick = () => document.getElementById("sidebar").classList.toggle("open");
    
    const scrollBtn = document.getElementById("scrollTopBtn");
    
    // ÉCOUTEUR UNIQUE DU SCROLL COMPRENANT LE BOUTON RETOUR EN HAUT + LE SCROLLSPY
    window.onscroll = () => {
      scrollBtn.style.display = window.scrollY > 300 ? "block" : "none";
      spyScroll();
    };

    scrollBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

    initDatabase();
  </script>
</body>

</html>
