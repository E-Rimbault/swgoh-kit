<!DOCTYPE HTML>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SWGOH Database - Effect Holocron</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --sw-bg-dark: #050505;
      --sw-bg-card: #121212;
      --sw-border: #333;
      --sw-text-main: #e0e0e0;
      --sw-text-muted: #aaaaaa;
      --sw-blue-glow: rgba(0, 115, 255, 0.6);
      --sw-blue-text: #00a2ff;
      --sw-red-text: #ff4d4d; /* Pour les debuffs */
      --font-titles: 'Orbitron', sans-serif;
      --font-body: 'Roboto', sans-serif;
      --sidebar-width: 380px;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--sw-bg-dark);
      background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
      color: var(--sw-text-main);
      margin: 0;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, h5, .card-title { font-family: var(--font-titles); letter-spacing: 1px; }

    /* Layout */
    #sidebar {
      position: fixed; top: 0; left: 0; height: 100vh; width: var(--sidebar-width);
      background-color: rgba(10, 10, 10, 0.95); backdrop-filter: blur(5px);
      padding: 25px; overflow-y: auto; border-right: 2px solid var(--sw-border);
      z-index: 1000; transition: transform 0.3s ease;
    }

    #content {
      margin-left: var(--sidebar-width);
      padding: 30px; min-height: 100vh;
    }

    /* Elements UI Filters */
    .filter-box {
      background: rgba(255, 255, 255, 0.03); padding: 15px;
      border-radius: 8px; margin-bottom: 20px; border: 1px solid #222;
    }

    .filter-box h5 { 
        font-size: 0.85rem; text-transform: uppercase; color: var(--sw-blue-text); 
        margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px;
    }

    /* Cards Styling */
    #results {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;
    }

    .card {
      background-color: var(--sw-bg-card); border: 1px solid #222; border-radius: 8px;
      transition: all 0.3s; height: 100%; display: flex; flex-direction: column;
    }

    .card:hover {
      transform: translateY(-5px); border-color: var(--sw-blue-text);
      box-shadow: 0 5px 20px rgba(0, 162, 255, 0.3);
    }

    .card-img-container {
      width: 100%; height: 140px; background: radial-gradient(circle, #2a2a2a 0%, #121212 100%);
      display: flex; align-items: center; justify-content: center; padding: 10px;
    }

    .card img { max-width: 70%; max-height: 100%; object-fit: contain; }

    .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }

    .card-title { 
        font-size: 1rem; color: #fff; margin-bottom: 12px; text-align: center; 
        border-bottom: 1px solid #333; padding-bottom: 8px; 
    }

    /* Effets (Buffs/Debuffs) dans la carte */
    .effects-container { margin-top: 10px; }
    
    .accordion-block { margin-bottom: 8px; border: 1px solid #222; border-radius: 4px; overflow: hidden; }
    
    .accordion-header {
      background: #1a1a1a; color: var(--sw-text-muted); padding: 6px 10px; 
      cursor: pointer; font-size: 0.75rem; font-family: var(--font-titles);
      display: flex; justify-content: space-between; align-items: center;
    }
    
    .accordion-header:hover { background: #252525; color: #fff; }
    
    .accordion-body { 
        padding: 8px; display: none; background: #0c0c0c; 
        max-height: 150px; overflow-y: auto; 
    }

    .effect-item {
      display: inline-block; padding: 3px 8px; margin: 2px; border-radius: 4px;
      font-size: 0.7rem; cursor: pointer; transition: 0.2s;
      border: 1px solid transparent;
    }
    
    .effect-item.buff { background: rgba(0, 162, 255, 0.1); color: var(--sw-blue-text); border-color: rgba(0, 162, 255, 0.3); }
    .effect-item.debuff { background: rgba(255, 77, 77, 0.1); color: var(--sw-red-text); border-color: rgba(255, 77, 77, 0.3); }
    
    .effect-item:hover { background: var(--sw-blue-text); color: #000; }

    .unit-label { color: var(--sw-blue-text); font-weight: bold; font-size: 0.75rem; text-transform: uppercase; }

    .btn-primary {
      background: transparent; border: 1px solid var(--sw-blue-text); color: var(--sw-blue-text);
      font-family: var(--font-titles); font-size: 0.8rem; margin-top: 15px; width: 100%;
    }

    .btn-primary:hover { background: var(--sw-blue-text); color: #000; box-shadow: 0 0 10px var(--sw-blue-glow); }

    /* Langue & Mobile */
    .lang-toggle { display:flex; justify-content:center; gap:15px; margin-bottom:20px; }
    .lang-toggle img { cursor:pointer; width:30px; height:30px; border-radius:50%; opacity: 0.4; transition: 0.3s; }
    .lang-toggle img.active { opacity: 1; border: 2px solid var(--sw-blue-text); }

    #scrollTopBtn {
      position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: none;
      background: var(--sw-blue-text); color: black; border: none; border-radius: 50%;
      width: 45px; height: 45px; font-weight: bold; cursor: pointer;
    }

    #mobile-filter-toggle {
        display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        z-index: 1001; background: var(--sw-blue-text); color: #000; border: none;
        padding: 10px 25px; border-radius: 30px; font-weight: bold; font-family: var(--font-titles);
    }

    @media (max-width: 992px) {
        #sidebar { left: -100%; width: 320px; }
        #sidebar.open { transform: translateX(100%); }
        #content { margin-left: 0; }
        #mobile-filter-toggle { display: block; }
    }
  </style>
</head>
<body>

  <button id="mobile-filter-toggle">🔍 FILTERS</button>
  <button id="scrollTopBtn">↑</button>

  <div id="sidebar">
    <div id="filter-title" style="font-family: var(--font-titles); text-align: center; margin-bottom: 20px; font-size: 1.2rem;">EFFECT FILTER</div>

    <div class="lang-toggle">
      <img src="https://flagcdn.com/us.svg" alt="English" id="lang-en">
      <img src="https://flagcdn.com/fr.svg" alt="Français" id="lang-fr">
    </div>

    <div class="filter-box">
      <h5 id="title-buffs">BUFFS & DEBUFFS</h5>
      <select id="buff-filter" class="form-select mb-2 bg-dark text-white border-secondary">
        <option value="">-- all buffs --</option>
      </select>
      <select id="debuff-filter" class="form-select mb-2 bg-dark text-white border-secondary">
        <option value="">-- all debuffs --</option>
      </select>
    </div>

    <div class="filter-box">
      <h5 id="title-search">SEARCH BY EFFECT</h5>
      <input type="text" id="effect-search" class="form-control bg-dark text-white border-secondary" placeholder="Search specific effect...">
    </div>

    <button id="reset-filters" class="btn btn-danger w-100 mb-2" style="font-family: var(--font-titles); font-size: 0.8rem;">⚡ RESET FILTERS</button>
    <button id="home-btn" class="btn btn-outline-info w-100" style="font-family: var(--font-titles); font-size: 0.8rem;" onclick="window.location.href='../index.html'">🏠 HOME</button>
  </div>

  <div id="content">
    <div class="d-flex justify-content-between align-items-center border-bottom border-secondary pb-2 mb-4">
        <h4 id="results-label" class="m-0">RESULTS</h4>
        <span id="result-count" class="badge bg-info text-dark">0</span>
    </div>
    <div id="active-filters" class="mb-3"></div>
    <div id="results"></div>
  </div>

  <script>
    let characters = [];
    let currentLang = sessionStorage.getItem("selectedLanguage") || "en";

    // Chargement JSON
    fetch("units.json")
      .then(res => res.json())
      .then(data => {
        characters = data;
        initPage();
      }).catch(e => {
        document.getElementById("results").innerHTML = "<p class='text-danger'>Error loading Holocron data.</p>";
      });

    function initPage() {
      syncLangUI();
      updateStaticText();
      generateEffectDropdowns();
      applyFilters();
    }

    function syncLangUI() {
      document.querySelectorAll(".lang-toggle img").forEach(i => i.classList.remove("active"));
      const activeFlag = document.getElementById("lang-" + currentLang);
      if (activeFlag) activeFlag.classList.add("active");
    }

    function updateStaticText() {
      const isFr = (currentLang === "fr");
      const elements = {
        "filter-title": isFr ? "FILTRE DES EFFETS" : "EFFECT FILTER",
        "title-buffs": isFr ? "BONUS & MALUS" : "BUFFS & DEBUFFS",
        "title-search": isFr ? "RECHERCHE PAR EFFET" : "SEARCH BY EFFECT",
        "reset-filters": isFr ? "⚡ RÉINITIALISER" : "⚡ RESET FILTERS",
        "home-btn": isFr ? "🏠 MENU PRINCIPAL" : "🏠 HOME MENU",
        "results-label": isFr ? "RÉSULTATS DE L'HOLOCRON" : "HOLOCRON RESULTS"
      };

      for (let id in elements) {
        const el = document.getElementById(id);
        if (el) el.textContent = elements[id];
      }

      document.getElementById("effect-search").placeholder = isFr ? "Rechercher un effet..." : "Search effect...";
      document.getElementById("buff-filter").options[0].text = isFr ? "-- tous les bonus --" : "-- all buffs --";
      document.getElementById("debuff-filter").options[0].text = isFr ? "-- tous les malus --" : "-- all debuffs --";
    }

    function generateEffectDropdowns() {
      const buffSelect = document.getElementById("buff-filter");
      const debuffSelect = document.getElementById("debuff-filter");
      const buffsSet = new Set(), debuffsSet = new Set();

      characters.forEach(c => {
        (c.effects?.buffs || []).forEach(e => buffsSet.add(e[currentLang] || e.en));
        (c.effects?.debuffs || []).forEach(e => debuffsSet.add(e[currentLang] || e.en));
      });

      const sortFn = (a,b) => a.localeCompare(b, currentLang);
      
      const buffOptions = Array.from(buffsSet).sort(sortFn).map(b => `<option value="${b.toLowerCase()}">${b}</option>`).join("");
      const debuffOptions = Array.from(debuffsSet).sort(sortFn).map(d => `<option value="${d.toLowerCase()}">${d}</option>`).join("");

      buffSelect.innerHTML = `<option value="">-- ${currentLang==='fr'?'tous les bonus':'all buffs'} --</option>` + buffOptions;
      debuffSelect.innerHTML = `<option value="">-- ${currentLang==='fr'?'tous les malus':'all debuffs'} --</option>` + debuffOptions;
    }

    function applyFilters() {
      const selectedBuff = document.getElementById("buff-filter").value;
      const selectedDebuff = document.getElementById("debuff-filter").value;
      const effectSearch = document.getElementById("effect-search").value.trim().toLowerCase();

      const filtered = characters.filter(c => {
        const buffs = (c.effects?.buffs || []).map(e => (e[currentLang] || e.en).toLowerCase());
        const debuffs = (c.effects?.debuffs || []).map(e => (e[currentLang] || e.en).toLowerCase());

        const matchBuff = !selectedBuff || buffs.includes(selectedBuff);
        const matchDebuff = !selectedDebuff || debuffs.includes(selectedDebuff);
        const matchSearch = !effectSearch || buffs.some(b => b.includes(effectSearch)) || debuffs.some(d => d.includes(effectSearch));

        return matchBuff && matchDebuff && matchSearch;
      });

      renderActiveFilters(selectedBuff, selectedDebuff, effectSearch);
      renderCharacters(filtered);
    }

    function renderCharacters(list) {
      const isFr = (currentLang === "fr");
      document.getElementById("result-count").textContent = list.length;
      const container = document.getElementById("results");
      
      container.innerHTML = list.length ? list.map(c => {
        const name = c.name[currentLang] || c.name.en;
        const uniq = 'eff-' + Math.random().toString(36).substr(2, 5);
        
        const buffsHtml = (c.effects?.buffs || []).map(e => {
            const txt = e[currentLang] || e.en;
            return `<span class="effect-item buff" onclick="quickFilter('${txt.toLowerCase()}', 'buff')">${txt}</span>`;
        }).join("") || `<span class="text-muted small">${isFr?'Aucun':'None'}</span>`;

        const debuffsHtml = (c.effects?.debuffs || []).map(e => {
            const txt = e[currentLang] || e.en;
            return `<span class="effect-item debuff" onclick="quickFilter('${txt.toLowerCase()}', 'debuff')">${txt}</span>`;
        }).join("") || `<span class="text-muted small">${isFr?'Aucun':'None'}</span>`;

        return `
          <div class="card">
            <div class="card-img-container"><img src="${c.image}" alt="${name}" loading="lazy"></div>
            <div class="card-body">
              <h5 class="card-title">${name}</h5>
              <div class="card-text">
                <div class="effects-container">
                  <div class="accordion-block">
                    <div class="accordion-header" onclick="toggleAccordion('${uniq}-b')">BUFFS <span>▼</span></div>
                    <div class="accordion-body" id="${uniq}-b">${buffsHtml}</div>
                  </div>
                  <div class="accordion-block">
                    <div class="accordion-header" onclick="toggleAccordion('${uniq}-d')">DEBUFFS <span>▼</span></div>
                    <div class="accordion-body" id="${uniq}-d">${debuffsHtml}</div>
                  </div>
                </div>
              </div>
              <button class="btn btn-primary btn-sm" onclick="window.location.href='${c.page}'">
                ${isFr ? 'DÉTAILS' : 'DETAILS'}
              </button>
            </div>
          </div>
        `;
      }).join("") : `<p class="w-100 text-center mt-5">${isFr ? "Aucune unité trouvée" : "No units found"}</p>`;
    }

    // Gestion accordéons
    window.toggleAccordion = (id) => {
        const el = document.getElementById(id);
        const isVisible = el.style.display === "block";
        el.style.display = isVisible ? "none" : "block";
    };

    // Filtre rapide depuis une carte
    window.quickFilter = (val, type) => {
        if(type === 'buff') document.getElementById("buff-filter").value = val;
        else document.getElementById("debuff-filter").value = val;
        applyFilters();
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    function renderActiveFilters(buff, debuff, search) {
        const container = document.getElementById("active-filters");
        container.innerHTML = "";
        let items = [];
        if (buff) items.push({val: buff, type: 'buff'});
        if (debuff) items.push({val: debuff, type: 'debuff'});
        if (search) items.push({val: search, type: 'search'});

        items.forEach(item => {
            const span = document.createElement("span");
            span.className = "badge bg-primary me-2 mb-2 p-2";
            span.style.cursor = "pointer";
            span.textContent = item.val + " ✕";
            span.onclick = () => {
                if(item.type === 'buff') document.getElementById("buff-filter").value = "";
                if(item.type === 'debuff') document.getElementById("debuff-filter").value = "";
                if(item.type === 'search') document.getElementById("effect-search").value = "";
                applyFilters();
            };
            container.appendChild(span);
        });
    }

    // --- Events ---
    document.getElementById("lang-en").onclick = () => { currentLang = "en"; updateLangUI("en"); };
    document.getElementById("lang-fr").onclick = () => { currentLang = "fr"; updateLangUI("fr"); };

    function updateLangUI(l) {
        sessionStorage.setItem("selectedLanguage", l);
        syncLangUI();
        initPage();
    }

    document.getElementById("buff-filter").onchange = applyFilters;
    document.getElementById("debuff-filter").onchange = applyFilters;
    document.getElementById("effect-search").oninput = applyFilters;
    document.getElementById("mobile-filter-toggle").onclick = () => document.getElementById("sidebar").classList.toggle("open");
    
    document.getElementById("reset-filters").onclick = () => {
        document.getElementById("buff-filter").value = "";
        document.getElementById("debuff-filter").value = "";
        document.getElementById("effect-search").value = "";
        applyFilters();
    };

    const scrollBtn = document.getElementById("scrollTopBtn");
    window.onscroll = () => scrollBtn.style.display = window.scrollY > 300 ? "block" : "none";
    scrollBtn.onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});

  </script>
</body>
</html>
