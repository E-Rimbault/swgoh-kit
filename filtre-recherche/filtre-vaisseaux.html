<!DOCTYPE HTML>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SWGOH Database - Character Holocron</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --sw-bg-dark: #050505;
      --sw-bg-card: #121212;
      --sw-border: #333;
      --sw-text-main: #e0e0e0;
      --sw-text-muted: #aaaaaa;
      --sw-blue-glow: rgba(0, 115, 255, 0.6);
      --sw-blue-text: #00a2ff;
      --font-titles: 'Orbitron', sans-serif;
      --font-body: 'Roboto', sans-serif;
      --sidebar-width: 380px;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--sw-bg-dark);
      background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
      color: var(--sw-text-main);
      margin: 0;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, h5, .card-title { font-family: var(--font-titles); letter-spacing: 1px; }

    /* Layout */
    #sidebar {
      position: fixed; top: 0; left: 0; height: 100vh; width: var(--sidebar-width);
      background-color: rgba(10, 10, 10, 0.95); backdrop-filter: blur(5px);
      padding: 25px; overflow-y: auto; border-right: 2px solid var(--sw-border);
      z-index: 1000; transition: transform 0.3s ease;
    }

    #content {
      margin-left: var(--sidebar-width);
      padding: 30px; min-height: 100vh;
    }

    /* Elements UI */
    .filter-box {
      background: rgba(255, 255, 255, 0.03); padding: 15px;
      border-radius: 8px; margin-bottom: 20px; border: 1px solid #222;
    }

    .filter-box h5 { font-size: 0.85rem; text-transform: uppercase; color: var(--sw-blue-text); margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px;}

    .category-grid {
      display: grid; grid-template-columns: 1fr; gap: 6px;
      max-height: 200px; overflow-y: auto; padding-right: 5px;
    }

    .category-grid label {
      display: flex; align-items: center; font-size: 0.85rem;
      background: #1a1a1a; padding: 6px 10px; border-radius: 4px; cursor: pointer; transition: 0.2s;
    }
    .category-grid label:hover { background: #252525; }

    .category-grid input { margin-right: 10px; accent-color: var(--sw-blue-text); }

    /* Cards */
    #results {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px;
    }

    .card {
      background-color: var(--sw-bg-card); border: 1px solid #222; border-radius: 8px;
      transition: all 0.3s; height: 100%; display: flex; flex-direction: column;
    }

    .card:hover {
      transform: translateY(-5px); border-color: var(--sw-blue-text);
      box-shadow: 0 5px 20px rgba(0, 162, 255, 0.3);
    }

    .card-img-container {
      width: 100%; height: 160px; background: radial-gradient(circle, #2a2a2a 0%, #121212 100%);
      display: flex; align-items: center; justify-content: center; padding: 10px;
    }

    .card img { max-width: 80%; max-height: 100%; object-fit: contain; }

    .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }

    .card-title { font-size: 1rem; color: #fff; margin-bottom: 12px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 8px; }

    .card-text { font-size: 0.82rem; color: var(--sw-text-muted); flex-grow: 1; line-height: 1.4; }
    
    .unit-label { color: var(--sw-blue-text); font-weight: bold; font-size: 0.75rem; text-transform: uppercase; }

    .btn-primary {
      background: transparent; border: 1px solid var(--sw-blue-text); color: var(--sw-blue-text);
      font-family: var(--font-titles); font-size: 0.8rem; margin-top: 15px; width: 100%;
    }

    .btn-primary:hover { background: var(--sw-blue-text); color: #000; box-shadow: 0 0 10px var(--sw-blue-glow); }

    /* Langue & Mobile */
    .lang-toggle { display:flex; justify-content:center; gap:15px; margin-bottom:20px; }
    .lang-toggle img { cursor:pointer; width:30px; height:30px; border-radius:50%; opacity: 0.4; transition: 0.3s; }
    .lang-toggle img.active { opacity: 1; border: 2px solid var(--sw-blue-text); }

    #scrollTopBtn {
      position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: none;
      background: var(--sw-blue-text); color: black; border: none; border-radius: 50%;
      width: 45px; height: 45px; font-weight: bold; cursor: pointer;
    }

    #mobile-filter-toggle {
        display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        z-index: 1001; background: var(--sw-blue-text); color: #000; border: none;
        padding: 10px 25px; border-radius: 30px; font-weight: bold; font-family: var(--font-titles);
    }

    @media (max-width: 992px) {
        #sidebar { left: -100%; width: 320px; }
        #sidebar.open { transform: translateX(100%); }
        #content { margin-left: 0; }
        #mobile-filter-toggle { display: block; }
    }
  </style>
</head>
<body>

  <button id="mobile-filter-toggle">🔍 FILTERS</button>
  <button id="scrollTopBtn">↑</button>

  <div id="sidebar">
    <div id="filter-title">SHIP FILTER</div>

    <div class="lang-toggle">
      <img src="https://flagcdn.com/us.svg" alt="English" id="lang-en">
      <img src="https://flagcdn.com/fr.svg" alt="Français" id="lang-fr">
    </div>

    <div class="filter-box">
      <h5 id="title-factions">FACTIONS</h5>
      <div class="category-grid" id="faction-filters"></div>
    </div>

    <div class="filter-box">
      <h5 id="title-alignment">ROLE & ALIGNMENT</h5>
      <select id="role-filter" class="form-select mb-2 bg-dark text-white border-secondary">
        <option value="">-- all roles --</option>
        <option value="attacker">Attacker / Attaquant</option>
        <option value="support">Support / Soutien</option>
        <option value="healer">Healer / Soigneur</option>
        <option value="tank">Tank / Tank</option>
      </select>
      <select id="alignment-filter" class="form-select bg-dark text-white border-secondary">
        <option value="">-- all alignments --</option>
        <option value="lightside">Light Side / Côté Lumineux</option>
        <option value="darkside">Dark Side / Côté Obscur</option>
        <option value="neutral">Neutral / Neutre</option>
      </select>
    </div>

    <div class="filter-box">
      <h5 id="title-search">SEARCH & TAGS</h5>
      <input type="text" id="search-bar" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="Search character...">
      <div class="input-group">
        <input type="text" id="tag-input" class="form-control bg-dark text-white border-secondary" placeholder="Add tag...">
        <button id="add-tag-btn" class="btn btn-outline-info">Add</button>
      </div>
      <datalist id="tag-suggestions"></datalist>
    </div>

    <button id="reset-filters" class="btn btn-danger w-100 mb-2">⚡ RESET FILTERS</button>
    <button id="home-btn" class="btn btn-outline-info w-100" onclick="window.location.href='../index.html'">🏠 HOME</button>
  </div>

  <div id="content">
    <div class="d-flex justify-content-between align-items-center border-bottom border-secondary pb-2 mb-4">
        <h4 id="results-label" class="m-0">RESULTS</h4>
        <span id="result-count" class="badge bg-info text-dark">0</span>
    </div>
    <div id="active-filters" class="mb-3"></div>
    <div id="results"></div>
  </div>

  <script>
    let ship = [];
    let customTags = [];
    let currentLang = sessionStorage.getItem("selectedLanguage") || "en";

    const factionPriority = {
      "galactic legend": 1, "légende galactique": 1,
      "leader": 2, "chef": 2,
      "fleet commander": 3, "commandant de la flotte": 3
    };

    // 📦 Chargement JSON
    fetch("ship.json")
      .then(res => res.json())
      .then(data => {
        ship = data;
        initPage();
      }).catch(e => {
        console.error("Error:", e);
        document.getElementById("results").innerHTML = "<p class='text-danger'>Error loading Holocron data.</p>";
      });

    function initPage() {
      syncLangUI(); // Synchronise visuellement les drapeaux au chargement
      updateStaticText();
      generateFactionFilters();
      applyFilters();
    }

    // Gère l'apparence active des drapeaux
    function syncLangUI() {
      document.querySelectorAll(".lang-toggle img").forEach(i => i.classList.remove("active"));
      const activeFlag = document.getElementById("lang-" + currentLang);
      if (activeFlag) activeFlag.classList.add("active");
    }

    function updateStaticText() {
      const isFr = (currentLang === "fr");
      const elements = {
        "filter-title": isFr ? "FILTRE DE VAISSEAUX" : "SHIP FILTER",
        "title-search": isFr ? "RECHERCHE & TAGS" : "SEARCH & TAGS",
        "title-factions": "FACTIONS",
        "title-alignment": isFr ? "RÔLE & ALIGNEMENT" : "ROLE & ALIGNMENT",
        "add-tag-btn": isFr ? "Ajouter" : "Add",
        "reset-filters": isFr ? "⚡ RÉINITIALISER" : "⚡ RESET FILTERS",
        "home-btn": isFr ? "🏠 MENU PRINCIPAL" : "🏠 HOME MENU",
        "results-label": isFr ? "RÉSULTATS DE L'HOLOCRON" : "Holocron's Result"
      };

      for (let id in elements) {
        const el = document.getElementById(id);
        if (el) el.textContent = elements[id];
      }

      document.getElementById("search-bar").placeholder = isFr ? "Rechercher..." : "Search character...";
      document.getElementById("tag-input").placeholder = isFr ? "Ajouter un tag..." : "Add a tag...";
      document.getElementById("role-filter").options[0].text = isFr ? "-- tous les rôles --" : "-- all roles --";
      document.getElementById("alignment-filter").options[0].text = isFr ? "-- tous les alignements --" : "-- all alignments --";
    }

    function generateFactionFilters() {
      const container = document.getElementById("faction-filters");
      const factionsSet = new Set();
      ship.forEach(c => (c.factions || []).forEach(f => factionsSet.add(f[currentLang] || f.en)));
      
      const sortedFactions = Array.from(factionsSet).sort((a, b) => {
        const pa = factionPriority[a.toLowerCase()] ?? 999;
        const pb = factionPriority[b.toLowerCase()] ?? 999;
        return pa !== pb ? pa - pb : a.localeCompare(b);
      });

      container.innerHTML = sortedFactions.map(f => `
        <label><input type="checkbox" class="faction-cb" value="${f.toLowerCase()}"> ${f}</label>
      `).join("");

      document.querySelectorAll(".faction-cb").forEach(cb => cb.addEventListener("change", applyFilters));
    }

    function normalizeAlignment(a) {
      if (!a) return "";
      const t = String(a).trim().toLowerCase().replace(/[\s_-]/g, "");
      if (t.includes("light")) return "lightside";
      if (t.includes("dark")) return "darkside";
      return "neutral";
    }

    function applyFilters() {
      const search = document.getElementById("search-bar").value.trim().toLowerCase();
      const role = document.getElementById("role-filter").value.toLowerCase();
      const align = normalizeAlignment(document.getElementById("alignment-filter").value);
      const selectedFactions = Array.from(document.querySelectorAll(".faction-cb:checked")).map(cb => cb.value);

      const filtered = ship.filter(c => {
        const name = (c.name[currentLang] || c.name.en).toLowerCase();
        const fNames = (c.factions || []).map(f => (f[currentLang] || f.en).toLowerCase());
        const cRole = (c.role?.en || "").toLowerCase();
        const cAlign = normalizeAlignment(c.alignment?.en || "");

        const matchSearch = !search || name.includes(search);
        const matchRole = !role || cRole === role;
        const matchAlign = !align || cAlign === align;
        const matchFactions = selectedFactions.length === 0 || selectedFactions.every(f => fNames.includes(f));
        const matchTags = customTags.length === 0 || customTags.every(tag => 
            name.includes(tag) || fNames.some(fn => fn.includes(tag))
        );

        return matchSearch && matchRole && matchAlign && matchFactions && matchTags;
      });

      filtered.sort((a, b) => (a.base_id || "").localeCompare(b.base_id || ""));
      
      renderActiveFilters(selectedFactions, role, align, search);
      rendership(filtered);
    }

    function rendership(list) {
      const isFr = (currentLang === "fr");
      document.getElementById("result-count").textContent = list.length;
      const container = document.getElementById("results");
      
      container.innerHTML = list.length ? list.map(c => {
        const fText = (c.factions || []).map(f => f[currentLang] || f.en).join(", ");
        const alignLabel = isFr ? "Alignement" : "Alignment";
        
        return `
          <div class="card">
            <div class="card-img-container"><img src="${c.image}" alt="${c.name.en}" loading="lazy"></div>
            <div class="card-body">
              <h5 class="card-title">${c.name[currentLang] || c.name.en}</h5>
              <div class="card-text">
                <p class="mb-1"><span class="unit-label">ID:</span> ${c.id || c.base_id}</p>
                <p class="mb-1"><span class="unit-label">Role:</span> ${c.role?.[currentLang] || c.role?.en || "---"}</p>
                <p class="mb-1"><span class="unit-label">${alignLabel}:</span> ${c.alignment?.[currentLang] || c.alignment?.en || "---"}</p>
                <p class="mb-0"><span class="unit-label">Factions:</span> ${fText}</p>
              </div>
              <button class="btn btn-primary btn-sm" onclick="window.location.href='${c.page}'">
                ${isFr ? 'DÉTAILS' : 'DETAILS'}
              </button>
            </div>
          </div>
        `;
      }).join("") : `<p class="w-100 text-center mt-5">${isFr ? "Aucun VAISSEAU trouvé" : "No ship found"}</p>`;
    }

    function renderActiveFilters(factions, role, align, search) {
        const container = document.getElementById("active-filters");
        container.innerHTML = "";
        let items = [...factions];
        if (role) items.push(role);
        if (align) items.push(align);
        if (search) items.push(search);
        customTags.forEach(t => items.push(t));

        items.forEach(text => {
            const span = document.createElement("span");
            span.className = "badge bg-primary me-2 mb-2 p-2";
            span.style.cursor = "pointer";
            span.textContent = text + " ✕";
            span.onclick = () => {
                customTags = customTags.filter(t => t !== text);
                document.querySelectorAll(".faction-cb").forEach(cb => { if(cb.value === text) cb.checked = false; });
                if(text === role) document.getElementById("role-filter").value = "";
                if(text === align) document.getElementById("alignment-filter").value = "";
                if(text === search) document.getElementById("search-bar").value = "";
                applyFilters();
            };
            container.appendChild(span);
        });
    }

    // --- Events ---
    document.getElementById("lang-en").onclick = () => { 
        currentLang = "en"; 
        updateLangUI("en"); 
    };
    document.getElementById("lang-fr").onclick = () => { 
        currentLang = "fr"; 
        updateLangUI("fr"); 
    };

    function updateLangUI(l) {
        sessionStorage.setItem("selectedLanguage", l);
        syncLangUI();
        initPage();
    }

    document.getElementById("add-tag-btn").onclick = () => {
        const val = document.getElementById("tag-input").value.trim().toLowerCase();
        if(val && !customTags.includes(val)) {
            customTags.push(val);
            document.getElementById("tag-input").value = "";
            applyFilters();
        }
    };

    document.getElementById("search-bar").oninput = applyFilters;
    document.getElementById("role-filter").onchange = applyFilters;
    document.getElementById("alignment-filter").onchange = applyFilters;
    document.getElementById("mobile-filter-toggle").onclick = () => document.getElementById("sidebar").classList.toggle("open");
    
    document.getElementById("reset-filters").onclick = () => {
        document.getElementById("search-bar").value = "";
        document.getElementById("role-filter").value = "";
        document.getElementById("alignment-filter").value = "";
        document.querySelectorAll(".faction-cb").forEach(c => c.checked = false);
        customTags = [];
        applyFilters();
    };

    const scrollBtn = document.getElementById("scrollTopBtn");
    window.onscroll = () => scrollBtn.style.display = window.scrollY > 300 ? "block" : "none";
    scrollBtn.onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});

  </script>
</body>
</html>
