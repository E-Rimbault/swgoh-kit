<!DOCTYPE HTML>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>SWGOH Database - Character Holocron</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --sw-bg-dark: #050505;
      --sw-bg-card: #121212;
      --sw-border: #333;
      --sw-text-main: #e0e0e0;
      --sw-text-muted: #aaaaaa;
      --sw-blue-glow: rgba(0, 115, 255, 0.6);
      --sw-blue-text: #00a2ff;
      --font-titles: 'Orbitron', sans-serif;
      --font-body: 'Roboto', sans-serif;
      --sidebar-width: 380px;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--sw-bg-dark);
      background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
      color: var(--sw-text-main);
      margin: 0;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, h5, .card-title {
      font-family: var(--font-titles);
      letter-spacing: 1px;
    }

    /* Layout Fixed for Mobile overlay issues */
    #sidebar {
      position: fixed;
      top: 0;
      left: -380px;
      height: 100vh;
      width: var(--sidebar-width);
      background-color: rgba(10, 10, 10, 0.98);
      backdrop-filter: blur(10px);
      padding: 25px;
      overflow-y: auto;
      border-right: 2px solid var(--sw-border);
      z-index: 1050;
      transition: transform 0.3s ease;
    }

    @media (min-width: 993px) {
      #sidebar {
        left: 0;
      }
      #content {
        margin-left: var(--sidebar-width);
      }
    }

    #sidebar.open {
      transform: translateX(380px);
    }

    #content {
      padding: 30px;
      min-height: 100vh;
      transition: margin-left 0.3s ease;
    }

    /* Custom Dropdown System */
    .filter-box {
      background: rgba(255, 255, 255, 0.03);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px solid #222;
    }

    .filter-box h5 {
      font-size: 0.85rem;
      text-transform: uppercase;
      color: var(--sw-blue-text);
      margin-bottom: 15px;
      border-bottom: 1px solid #333;
      padding-bottom: 5px;
    }

    .dropdown-trigger-btn {
      width: 100%;
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #444;
      padding: 8px 12px;
      border-radius: 6px;
      text-align: left;
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s;
    }

    .dropdown-trigger-btn:hover {
      background: #252525;
      border-color: var(--sw-blue-text);
    }

    .dropdown-trigger-btn::after {
      content: '▼';
      font-size: 0.7rem;
      color: var(--sw-blue-text);
      transition: transform 0.2s;
    }

    .dropdown-trigger-btn.open::after {
      transform: rotate(180deg);
    }

    .custom-dropdown-content {
      display: none;
      background: #0d0d0d;
      border: 1px solid #333;
      border-top: none;
      border-radius: 0 0 6px 6px;
      max-height: 220px;
      overflow-y: auto;
      padding: 8px;
      margin-top: -2px;
    }

    .custom-dropdown-content.show {
      display: block;
    }

    .filter-item-row {
      display: flex;
      align-items: center;
      background: #161616;
      padding: 5px 10px;
      border-radius: 4px;
      margin-bottom: 4px;
    }

    .filter-item-row input[type="checkbox"] {
      margin-right: 10px;
      accent-color: var(--sw-blue-text);
      cursor: pointer;
      width: 16px;
      height: 16px;
    }

    .filter-item-row span {
      font-size: 0.85rem;
      flex-grow: 1;
      cursor: pointer;
      user-select: none;
    }

    /* Small layout override for labels requested */
    .filter-box small.text-muted {
      color: #000 !important;
      font-weight: bold;
      padding: 2px 5px;
      border-radius: 2px;
    }

    /* Cards */
    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background-color: var(--sw-bg-card);
      border: 1px solid #222;
      border-radius: 8px;
      transition: all 0.3s;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: var(--sw-blue-text);
      box-shadow: 0 5px 20px rgba(0, 162, 255, 0.3);
    }

    .card-img-container {
      width: 100%;
      height: 160px;
      background: radial-gradient(circle, #2a2a2a 0%, #121212 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .card img {
      max-width: 80%;
      max-height: 100%;
      object-fit: contain;
    }

    .card-body {
      padding: 15px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-size: 1rem;
      color: #fff;
      margin-bottom: 12px;
      text-align: center;
      border-bottom: 1px solid #333;
      padding-bottom: 8px;
    }

    .card-text {
      font-size: 0.82rem;
      color: var(--sw-text-muted);
      flex-grow: 1;
      line-height: 1.4;
    }

    .unit-label {
      color: var(--sw-blue-text);
      font-weight: bold;
      font-size: 0.75rem;
      text-transform: uppercase;
    }

    .btn-primary {
      background: transparent;
      border: 1px solid var(--sw-blue-text);
      color: var(--sw-blue-text);
      font-family: var(--font-titles);
      font-size: 0.8rem;
      margin-top: 15px;
      width: 100%;
    }

    .btn-primary:hover {
      background: var(--sw-blue-text);
      color: #000;
      box-shadow: 0 0 10px var(--sw-blue-glow);
    }

    /* Langue & Mobile */
    .lang-toggle {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .lang-toggle img {
      cursor: pointer;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      opacity: 0.4;
      transition: 0.3s;
    }

    .lang-toggle img.active {
      opacity: 1;
      border: 2px solid var(--sw-blue-text);
    }

    #scrollTopBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      display: none;
      background: var(--sw-blue-text);
      color: black;
      border: none;
      border-radius: 50%;
      width: 45px;
      height: 45px;
      font-weight: bold;
      cursor: pointer;
    }

    #mobile-filter-toggle {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1100;
      background: var(--sw-blue-text);
      color: #000;
      border: none;
      padding: 10px 25px;
      border-radius: 30px;
      font-weight: bold;
      font-family: var(--font-titles);
      box-shadow: 0 0 15px rgba(0, 162, 255, 0.5);
    }

    @media (max-width: 992px) {
      #content {
        margin-left: 0;
        padding: 15px;
      }
      #mobile-filter-toggle {
        display: block;
      }
    }
  </style>
</head>

<body>

  <button id="mobile-filter-toggle">🔍 FILTERS</button>
  <button id="scrollTopBtn">↑</button>

  <div id="sidebar">
    <div id="filter-title" class="mb-3 text-center fw-bold text-white">CHARACTER FILTER</div>

    <div class="lang-toggle">
      <img src="https://flagcdn.com/us.svg" alt="English" id="lang-en">
      <img src="https://flagcdn.com/fr.svg" alt="Français" id="lang-fr">
    </div>

    <!-- 1. SEARCH BAR & TAGS FIRST -->
    <div class="filter-box">
      <h5 id="title-search">SEARCH & TAGS</h5>
      <div class="d-flex align-items-center mb-3 bg-dark p-1 rounded border border-secondary">
        <input type="text" id="search-bar" class="form-control bg-transparent text-white border-0"
          placeholder="Search character...">
        <button id="search-mode-toggle" data-mode="include" class="btn btn-link p-1 text-decoration-none"
          style="color: var(--sw-blue-text);">
          <span class="search-mode-icon">👁️</span>
        </button>
      </div>

      <div class="input-group">
        <input type="text" id="tag-input" class="form-control bg-dark text-white border-secondary"
          placeholder="Add tag...">
        <button id="add-tag-btn" class="btn btn-outline-info">Add</button>
      </div>
    </div>

    <!-- 2. FACTIONS -->
    <div class="filter-box">
      <h5 id="title-factions">FACTIONS</h5>
      <div class="custom-dropdown-container">
        <div class="dropdown-trigger-btn" id="faction-dd-btn">Expand Factions...</div>
        <div class="custom-dropdown-content" id="faction-filters"></div>
      </div>
    </div>

    <!-- 3. ROLE, ALIGNMENT & YEAR -->
    <div class="filter-box">
      <h5 id="title-alignment">ROLE, ALIGNMENT & YEAR</h5>

      <div class="mb-3">
        <small class="text-muted d-block mb-1" id="sub-role" style="background-color: white;">Roles</small>
        <div class="custom-dropdown-container">
          <div class="dropdown-trigger-btn" id="role-dd-btn">Expand Roles...</div>
          <div class="custom-dropdown-content" id="role-filters-container"></div>
        </div>
      </div>

      <div class="mb-3">
        <small class="text-muted d-block mb-1" id="sub-align" style="background-color: white;">Alignments</small>
        <div class="custom-dropdown-container">
          <div class="dropdown-trigger-btn" id="align-dd-btn">Expand Alignments...</div>
          <div class="custom-dropdown-content" id="alignment-filters-container"></div>
        </div>
      </div>

      <div class="mb-2">
        <small class="text-muted d-block mb-1" id="sub-year" style="background-color: white;">Years</small>
        <div class="custom-dropdown-container">
          <div class="dropdown-trigger-btn" id="year-dd-btn">Expand Years...</div>
          <div class="custom-dropdown-content" id="year-filters-container"></div>
        </div>
      </div>
    </div>

    <button id="reset-filters" class="btn btn-danger w-100 mb-2">⚡ RESET FILTERS</button>
    <button id="home-btn" class="btn btn-outline-info w-100" onclick="window.location.href='../index.html'">🏠
      HOME</button>
  </div>

  <div id="content">
    <div class="d-flex justify-content-between align-items-center border-bottom border-secondary pb-2 mb-4">
      <h4 id="results-label" class="m-0">RESULTS</h4>
      <span id="result-count" class="badge bg-info text-dark">0</span>
    </div>
    <div id="active-filters" class="mb-3"></div>
    <div id="results"></div>
  </div>

  <script>
    let characters = [];
    let customTags = [];
    let currentLang = sessionStorage.getItem("selectedLanguage") || "en";

    const factionPriority = {
      "galactic legend": 1, "légende galactique": 1,
      "leader": 2, "chef": 2,
      "fleet commander": 3, "commandant de la flotte": 3
    };

    fetch("units.json")
      .then(res => res.json())
      .then(data => {
        characters = data;
        initPage();
      }).catch(e => {
        console.error("Error:", e);
        document.getElementById("results").innerHTML = "<p class='text-danger'>Error loading Holocron data.</p>";
      });

    function initPage() {
      syncLangUI();
      updateStaticText();
      generateFactionFilters();
      generateGenericFilters(); 
      applyFilters();
      setupDropdownTriggers();
    }

    function syncLangUI() {
      document.querySelectorAll(".lang-toggle img").forEach(i => i.classList.remove("active"));
      const activeFlag = document.getElementById("lang-" + currentLang);
      if (activeFlag) activeFlag.classList.add("active");
    }

    function updateStaticText() {
      const isFr = (currentLang === "fr");
      const elements = {
        "filter-title": isFr ? "FILTRE DE PERSONNAGES" : "CHARACTER FILTER",
        "title-search": isFr ? "RECHERCHE & TAGS" : "SEARCH & TAGS",
        "title-factions": "FACTIONS",
        "title-alignment": isFr ? "RÔLE, ALIGNEMENT & ANNÉE" : "ROLE, ALIGNMENT & YEAR",
        "add-tag-btn": isFr ? "Ajouter" : "Add",
        "reset-filters": isFr ? "⚡ RÉINITIALISER" : "⚡ RESET FILTERS",
        "home-btn": isFr ? "🏠 MENU PRINCIPAL" : "🏠 HOME MENU",
        "results-label": isFr ? "RÉSULTATS DE L'HOLOCRON" : "Holocron's Result",
        "sub-role": isFr ? "Rôles" : "Roles",
        "sub-align": isFr ? "Alignements" : "Alignments",
        "sub-year": isFr ? "Années de sortie" : "Years",
        "faction-dd-btn": isFr ? "Afficher les Factions..." : "Expand Factions...",
        "role-dd-btn": isFr ? "Afficher les Rôles..." : "Expand Roles...",
        "align-dd-btn": isFr ? "Afficher les Alignements..." : "Expand Alignments...",
        "year-dd-btn": isFr ? "Afficher les Années..." : "Expand Years..."
      };

      for (let id in elements) {
        const el = document.getElementById(id);
        if (el) el.textContent = elements[id];
      }

      document.getElementById("search-bar").placeholder = isFr ? "Rechercher..." : "Search character...";
      document.getElementById("tag-input").placeholder = isFr ? "Ajouter un tag..." : "Add a tag...";
    }

    function setupDropdownTriggers() {
      document.querySelectorAll('.dropdown-trigger-btn').forEach(btn => {
        btn.onclick = function(e) {
          e.stopPropagation();
          const targetContent = this.nextElementSibling;
          document.querySelectorAll('.custom-dropdown-content').forEach(content => {
            if (content !== targetContent) content.classList.remove('show');
          });
          document.querySelectorAll('.dropdown-trigger-btn').forEach(b => {
            if (b !== this) b.classList.remove('open');
          });
          this.classList.toggle('open');
          targetContent.classList.toggle('show');
        };
      });

      document.addEventListener('click', function() {
        document.querySelectorAll('.custom-dropdown-content').forEach(c => c.classList.remove('show'));
        document.querySelectorAll('.dropdown-trigger-btn').forEach(b => b.classList.remove('open'));
      });
      document.getElementById('sidebar').addEventListener('click', function(e) {
        e.stopPropagation();
      });
    }

    function createFilterItemHTML(prefix, value, displayLabel) {
      return `
        <div class="${prefix}-item filter-item-row">
          <input type="checkbox" class="${prefix}-cb" value="${value}" data-label="${displayLabel}" id="cb-${prefix}-${value}">
          <span onclick="document.getElementById('cb-${prefix}-${value}').click()">${displayLabel}</span>
          <button class="btn-mode-toggle generic-toggle" data-mode="include" title="Inclure/Exclure" 
                  style="background:none; border:none; color: var(--sw-blue-text); font-size: 0.9rem; padding: 0 5px;">
            <span class="mode-icon">👁️</span>
          </button>
        </div>
      `;
    }

    function bindToggleEvents(className) {
      document.querySelectorAll(`.${className}-item .btn-mode-toggle`).forEach(btn => {
        btn.addEventListener("click", function (e) {
          e.stopPropagation();
          const icon = this.querySelector(".mode-icon");
          if (this.dataset.mode === "exclude") {
            this.dataset.mode = "include";
            icon.textContent = "👁️";
            this.style.color = "var(--sw-blue-text)";
          } else {
            this.dataset.mode = "exclude";
            icon.textContent = "🚫";
            this.style.color = "#ff4444";
          }
          const cb = this.parentElement.querySelector(`.${className}-cb`);
          if (cb.checked) applyFilters();
        });
      });
      document.querySelectorAll(`.${className}-cb`).forEach(cb => {
        cb.addEventListener("change", applyFilters);
      });
    }

    function generateFactionFilters() {
      const container = document.getElementById("faction-filters");
      const factionsSet = new Set();
      characters.forEach(c => (c.factions || []).forEach(f => factionsSet.add(f[currentLang] || f.en)));

      const sortedFactions = Array.from(factionsSet).sort((a, b) => {
        const pa = factionPriority[a.toLowerCase()] ?? 999;
        const pb = factionPriority[b.toLowerCase()] ?? 999;
        return pa !== pb ? pa - pb : a.localeCompare(b);
      });

      container.innerHTML = sortedFactions.map(f => createFilterItemHTML('faction', f.toLowerCase(), f)).join("");
      bindToggleEvents('faction');
    }

    function generateGenericFilters() {
      const isFr = (currentLang === "fr");

      const rolesData = [
        { val: "attacker", label: isFr ? "Attaquant" : "Attacker" },
        { val: "support", label: isFr ? "Soutien" : "Support" },
        { val: "healer", label: isFr ? "Soigneur" : "Healer" },
        { val: "tank", label: isFr ? "Tank" : "Tank" }
      ];
      document.getElementById("role-filters-container").innerHTML = rolesData.map(r => createFilterItemHTML('role', r.val, r.label)).join("");
      bindToggleEvents('role');

      const alignmentsData = [
        { val: "lightside", label: isFr ? "Côté Lumineux" : "Light Side" },
        { val: "darkside", label: isFr ? "Côté Obscur" : "Dark Side" },
        { val: "neutral", label: isFr ? "Neutre" : "Neutral" }
      ];
      document.getElementById("alignment-filters-container").innerHTML = alignmentsData.map(a => createFilterItemHTML('align', a.val, a.label)).join("");
      bindToggleEvents('align');

      const years = [...new Set(characters.map(c => c.years_of_apparition))].filter(y => y != null).sort((a, b) => b - a);
      document.getElementById("year-filters-container").innerHTML = years.map(y => createFilterItemHTML('year', String(y), String(y))).join("");
      bindToggleEvents('year');
    }

    function normalizeAlignment(a) {
      if (!a) return "";
      const t = String(a).trim().toLowerCase().replace(/[\s_-]/g, "");
      if (t.includes("light")) return "lightside";
      if (t.includes("dark")) return "darkside";
      return "neutral";
    }

    function getActiveFilters(className) {
      const inclusions = [];
      const exclusions = [];
      document.querySelectorAll(`.${className}-cb:checked`).forEach(cb => {
        const modeBtn = cb.parentElement.querySelector(".btn-mode-toggle");
        const itemData = { value: cb.value, label: cb.getAttribute("data-label") };
        if (modeBtn && modeBtn.dataset.mode === "exclude") {
          exclusions.push(itemData);
        } else {
          inclusions.push(itemData);
        }
      });
      return { inclusions, exclusions };
    }

    function applyFilters() {
      const searchInput = document.getElementById("search-bar").value.trim().toLowerCase();
      const searchMode = document.getElementById("search-mode-toggle").dataset.mode;

      const factions = getActiveFilters('faction');
      const roles = getActiveFilters('role');
      const alignments = getActiveFilters('align');
      const years = getActiveFilters('year');

      const facIncVals = factions.inclusions.map(f => f.value);
      const facExcVals = factions.exclusions.map(f => f.value);
      const rolIncVals = roles.inclusions.map(r => r.value);
      const rolExcVals = roles.exclusions.map(r => r.value);
      const algIncVals = alignments.inclusions.map(a => a.value);
      const algExcVals = alignments.exclusions.map(a => a.value);
      const yIncVals = years.inclusions.map(y => y.value);
      const yExcVals = years.exclusions.map(y => y.value);

      const filtered = characters.filter(c => {
        const name = (c.name[currentLang] || c.name.en).toLowerCase();
        const fNames = (c.factions || []).map(f => (f[currentLang] || f.en).toLowerCase());
        const cRole = (c.role?.en || "").toLowerCase();
        const cAlign = normalizeAlignment(c.alignment?.en || "");
        const cYear = String(c.years_of_apparition || "");

        let matchSearch = true;
        if (searchInput) {
          const containsSearch = name.includes(searchInput);
          matchSearch = (searchMode === "exclude") ? !containsSearch : containsSearch;
        }

        const matchFactionInc = facIncVals.every(f => fNames.includes(f));
        const matchFactionExc = !facExcVals.some(f => fNames.includes(f));

        const matchRoleInc = rolIncVals.length === 0 || rolIncVals.includes(cRole);
        const matchRoleExc = !rolExcVals.includes(cRole);

        const matchAlignInc = algIncVals.length === 0 || algIncVals.includes(cAlign);
        const matchAlignExc = !algExcVals.includes(cAlign);

        const matchYearInc = yIncVals.length === 0 || yIncVals.includes(cYear);
        const matchYearExc = !yExcVals.includes(cYear);

        const matchTags = customTags.length === 0 || customTags.every(tag =>
          name.includes(tag) || fNames.some(fn => fn.includes(tag))
        );

        return matchSearch && matchFactionInc && matchFactionExc &&
          matchRoleInc && matchRoleExc && matchAlignInc && matchAlignExc &&
          matchYearInc && matchYearExc && matchTags;
      });

      filtered.sort((a, b) => (a.base_id || "").localeCompare(b.base_id || ""));

      renderActiveFilters(factions, roles, alignments, years, searchInput, searchMode);
      renderCharacters(filtered);
    }

    function renderCharacters(list) {
      const isFr = (currentLang === "fr");
      document.getElementById("result-count").textContent = list.length;
      const container = document.getElementById("results");

      container.innerHTML = list.length ? list.map(c => {
        const fText = (c.factions || []).map(f => f[currentLang] || f.en).join(", ");
        const alignLabel = isFr ? "Alignement" : "Alignment";

        return `
          <div class="card">
            <div class="card-img-container"><img src="${c.image}" alt="${c.name.en}" loading="lazy"></div>
            <div class="card-body">
              <h5 class="card-title">${c.name[currentLang] || c.name.en}</h5>
              <div class="card-text">
                <p class="mb-1"><span class="unit-label">ID:</span> ${c.id || c.base_id}</p>
                <p class="mb-1"><span class="unit-label">Role:</span> ${c.role?.[currentLang] || c.role?.en || "---"}</p>
                <p class="mb-1"><span class="unit-label">${alignLabel}:</span> ${c.alignment?.[currentLang] || c.alignment?.en || "---"}</p>
                <p class="mb-1"><span class="unit-label">Factions:</span> ${fText}</p>
                <p class="mb-0"><span class="unit-label">Year:</span> ${c.years_of_apparition || "---"}</p>
              </div>
              <button class="btn btn-primary btn-sm" onclick="window.location.href='${c.page}'">
                ${isFr ? 'DÉTAILS' : 'DETAILS'}
              </button>
            </div>
          </div>
        `;
      }).join("") : `<p class="w-100 text-center mt-5">${isFr ? "Aucun personnage trouvé" : "No characters found"}</p>`;
    }

    function renderActiveFilters(factions, roles, alignments, years, search, searchMode) {
      const container = document.getElementById("active-filters");
      container.innerHTML = "";

      const createBadge = (displayText, type, value, isExclusion = false) => {
        const span = document.createElement("span");
        span.className = isExclusion ? "badge bg-danger me-2 mb-2 p-2" : "badge bg-primary me-2 mb-2 p-2";
        span.style.cursor = "pointer";
        span.textContent = (isExclusion ? "NOT " : "") + displayText.toUpperCase() + " ✕";
        span.onclick = () => {
          if (type === 'search') {
            document.getElementById("search-bar").value = "";
          } else {
            document.querySelectorAll(`.${type}-cb`).forEach(cb => {
              if (cb.value === value) cb.checked = false;
            });
          }
          applyFilters();
        };
        container.appendChild(span);
      };

      factions.inclusions.forEach(f => createBadge(f.label, 'faction', f.value, false));
      factions.exclusions.forEach(f => createBadge(f.label, 'faction', f.value, true));

      roles.inclusions.forEach(r => createBadge(r.label, 'role', r.value, false));
      roles.exclusions.forEach(r => createBadge(r.label, 'role', r.value, true));

      alignments.inclusions.forEach(a => createBadge(a.label, 'align', a.value, false));
      alignments.exclusions.forEach(a => createBadge(a.label, 'align', a.value, true));

      years.inclusions.forEach(y => createBadge(y.label, 'year', y.value, false));
      years.exclusions.forEach(y => createBadge(y.label, 'year', y.value, true));

      if (search) {
        createBadge(`"${search}"`, 'search', null, searchMode === 'exclude');
      }
    }

    document.getElementById("search-mode-toggle").onclick = function () {
      const icon = this.querySelector(".search-mode-icon");
      if (this.dataset.mode === "exclude") {
        this.dataset.mode = "include";
        icon.textContent = "👁️";
        this.style.color = "var(--sw-blue-text)";
      } else {
        this.dataset.mode = "exclude";
        icon.textContent = "🚫";
        this.style.color = "#ff4444";
      }
      if (document.getElementById("search-bar").value.trim()) applyFilters();
    };

    document.getElementById("lang-en").onclick = () => { currentLang = "en"; updateLangUI("en"); };
    document.getElementById("lang-fr").onclick = () => { currentLang = "fr"; updateLangUI("fr"); };

    function updateLangUI(l) {
      sessionStorage.setItem("selectedLanguage", l);
      syncLangUI();
      initPage();
    }

    document.getElementById("add-tag-btn").onclick = () => {
      const val = document.getElementById("tag-input").value.trim().toLowerCase();
      if (val && !customTags.includes(val)) {
        customTags.push(val);
        document.getElementById("tag-input").value = "";
        applyFilters();
      }
    };

    document.getElementById("search-bar").oninput = applyFilters;
    
    document.getElementById("mobile-filter-toggle").onclick = function(e) {
      e.stopPropagation();
      document.getElementById("sidebar").classList.toggle("open");
    };

    document.addEventListener('click', function(e) {
      const sidebar = document.getElementById("sidebar");
      if (window.innerWidth <= 992 && sidebar.classList.contains("open") && !sidebar.contains(e.target)) {
        sidebar.classList.remove("open");
      }
    });

    document.getElementById("reset-filters").onclick = () => {
      document.getElementById("search-bar").value = "";

      const sMode = document.getElementById("search-mode-toggle");
      sMode.dataset.mode = "include";
      sMode.querySelector(".search-mode-icon").textContent = "👁️";
      sMode.style.color = "var(--sw-blue-text)";

      document.querySelectorAll("#sidebar input[type='checkbox']").forEach(cb => cb.checked = false);

      document.querySelectorAll(".btn-mode-toggle").forEach(btn => {
        btn.dataset.mode = "include";
        const icon = btn.querySelector(".mode-icon");
        if (icon) icon.textContent = "👁️";
        btn.style.color = "var(--sw-blue-text)";
      });

      customTags = [];
      applyFilters();
    };

    const scrollBtn = document.getElementById("scrollTopBtn");
    window.onscroll = () => scrollBtn.style.display = window.scrollY > 300 ? "block" : "none";
    scrollBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
  </script>
</body>

</html>
