<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title id="page-title">Raid Units</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/unit-style.css">
    <style>
        /* Style Global Star Wars / Hyperespace */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            padding: 20px; 
            text-align: center; 
            background: #020208;
            color: #ecf0f1;
            margin: 0;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* Effet de fond étoilé / Hyperespace */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: hyperdrive 12s linear infinite;
            opacity: 0.6;
        }

        @keyframes hyperdrive {
            from { background-position: 0 0, 40px 60px, 130px 270px; }
            to { background-position: 0 1100px, 40px 1160px, 130px 1370px; }
        }

        /* Conteneur principal au-dessus du fond */
        .main-content {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Sélecteur de langue style Écran de contrôle */
        .language-switcher { 
            display: flex; 
            justify-content: flex-end; 
            gap: 15px; 
            margin-bottom: 20px; 
        }
        .language-switcher img { 
            width: 32px; 
            height: 32px; 
            cursor: pointer; 
            border: 2px solid rgba(255, 255, 255, 0.2); 
            border-radius: 50%; 
            transition: all 0.3s ease;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .language-switcher img:hover {
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.8);
        }

        /* Boutons de navigation stylisés */
        .nav-buttons-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-back, .btn-raids { 
            display: inline-block; 
            background: rgba(255, 43, 43, 0.15); 
            color: #ff5454; 
            padding: 10px 20px; 
            border-radius: 6px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 13px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 43, 43, 0.4);
            box-shadow: 0 0 10px rgba(255, 43, 43, 0.2);
            transition: all 0.2s ease-in-out;
        }
        
        .btn-back:hover, .btn-raids:hover { 
            background: rgba(255, 43, 43, 0.3);
            color: #fff;
            border-color: #ff2b2b;
            box-shadow: 0 0 15px rgba(255, 43, 43, 0.6);
        }

        .btn-back {
            background: rgba(43, 124, 255, 0.15); 
            color: #549bff; 
            border: 1px solid rgba(43, 124, 255, 0.4);
            box-shadow: 0 0 10px rgba(43, 124, 255, 0.2);
        }

        .btn-back:hover {
            background: rgba(43, 124, 255, 0.3);
            color: #fff;
            border-color: #2b7cff;
            box-shadow: 0 0 15px rgba(43, 124, 255, 0.6);
            transform: translateX(-3px);
        }

        .btn-raids:hover {
            transform: translateY(-2px);
        }

        /* Titres Lumineux Néon Holocron */
        h1 { 
            font-size: 36px; 
            margin-top: 10px;
            margin-bottom: 10px; 
            color: #fff; 
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6), 0 0 20px rgba(255, 43, 43, 0.5);
        }
        .subtitle { 
            font-size: 16px; 
            color: #8a99ad; 
            margin-bottom: 35px; 
            font-style: italic;
            letter-spacing: 0.5px;
        }

        /* Grille de fiches personnages */
        .units-grid { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 25px; 
            padding-bottom: 50px;
        }

        /* Cartes Personnages Holographiques */
        .unit-card { 
            background: rgba(15, 20, 35, 0.75); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 14px; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
            padding: 20px; 
            width: 175px; 
            text-decoration: none; 
            color: inherit; 
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .unit-card:hover { 
            transform: translateY(-8px); 
            border-color: rgba(255, 43, 43, 0.6);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 20px rgba(255, 43, 43, 0.3); 
            background: rgba(25, 20, 35, 0.85);
        }

        /* Images des personnages */
        .unit-img { 
            width: 110px; 
            height: 110px; 
            object-fit: contain; 
            margin-bottom: 15px; 
            border-radius: 50%; 
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            transition: border-color 0.3s ease;
        }
        .unit-card:hover .unit-img {
            border-color: #ff2b2b;
        }

        /* Textes des Cartes */
        .unit-name { 
            font-weight: 700; 
            font-size: 15px; 
            text-align: center; 
            color: #fff;
            line-height: 1.3;
        }
        .unit-role { 
            font-size: 11px; 
            color: #8a99ad; 
            margin-top: 8px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.05);
            padding: 3px 10px;
            border-radius: 20px;
        }
        .unit-card:hover .unit-role {
            color: #ff5454;
            background: rgba(255, 43, 43, 0.1);
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="language-switcher">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Flag_of_France.svg" alt="Français" id="lang-fr">
            <img src="https://upload.wikimedia.org/wikipedia/en/a/a4/Flag_of_the_United_States.svg" alt="English" id="lang-en">
        </div>

        <div class="nav-buttons-container">
            <a href="javascript:history.back()" class="btn-back" id="text-back">← Go Back</a>
            <a href="https://e-rimbault.github.io/swgoh-kit/raid/raid.html" class="btn-raids" id="text-raids">⚔️ All Raids</a>
        </div>

        <h1 id="raid-title">Loading Raid...</h1>
        <p class="subtitle" id="raid-subtitle">Discover all units recommended or required for this raid</p>

        <div class="units-grid" id="units-container"></div>
    </div>

    <script>
        let allUnitsData = [];
        let targetRaidNameEN = "";

        const staticTranslations = {
            "fr": {
                "text-back": "← Retour",
                "text-raids": "⚔️ Tous les Raids",
                "raid-subtitle": "Découvrez tous les personnages recommandés ou requis pour ce raid"
            },
            "en": {
                "text-back": "← Go Back",
                "text-raids": "⚔️ All Raids",
                "raid-subtitle": "Discover all units recommended or required for this raid"
            }
        };

        function getParamRaidName() {
            const params = new URLSearchParams(window.location.search);
            return params.get('name') || "";
        }

        function loadRaidPage() {
            targetRaidNameEN = getParamRaidName();
            if (!targetRaidNameEN) {
                document.getElementById('raid-title').innerText = "No Raid Specified";
                return;
            }

            fetch('https://e-rimbault.github.io/swgoh-kit/filtre-recherche/units.json')
                .then(response => response.json())
                .then(data => {
                    allUnitsData = data;
                    renderPage();
                })
                .catch(err => {
                    console.error("Error loading json source:", err);
                });
        }

        function renderPage() {
            const lang = sessionStorage.getItem("selectedLanguage") || "en";
            const container = document.getElementById('units-container');
            container.innerHTML = ""; 

            // Modification majeure ici : filtrage dans la liste d'objets "raids" du JSON
            const filteredUnits = allUnitsData.filter(u => 
                u.raids && u.raids.some(r => r.en.toLowerCase() === targetRaidNameEN.toLowerCase())
            );

            // Traduction des éléments statiques de l'interface
            document.getElementById('text-back').innerText = staticTranslations[lang]["text-back"];
            document.getElementById('text-raids').innerText = staticTranslations[lang]["text-raids"];
            document.getElementById('raid-subtitle').innerText = staticTranslations[lang]["raid-subtitle"];

            if (filteredUnits.length > 0) {
                // On cherche l'objet de traduction du raid précis pour le titre
                const currentRaidObject = filteredUnits[0].raids.find(r => r.en.toLowerCase() === targetRaidNameEN.toLowerCase());
                const raidTitleText = lang === "fr" ? currentRaidObject.fr : currentRaidObject.en;
                
                document.getElementById('raid-title').innerText = raidTitleText;
                document.getElementById('page-title').innerText = raidTitleText;

                filteredUnits.forEach(unit => {
                    const card = document.createElement('a');
                    card.className = "unit-card";
                    card.href = unit.page ? unit.page : `#`;

                    const uName = lang === "fr" ? unit.name.fr : unit.name.en;
                    const uRole = lang === "fr" ? unit.role.fr : unit.role.en;

                    card.innerHTML = `
                        <img src="${unit.image}" class="unit-img" alt="${uName}">
                        <div class="unit-name">${uName}</div>
                        <div class="unit-role">${uRole}</div>
                    `;
                    container.appendChild(card);
                });
            } else {
                document.getElementById('raid-title').innerText = targetRaidNameEN;
                container.innerHTML = `<p style="font-style:italic; color:#8a99ad;">No characters found for this raid.</p>`;
            }

            updateFlagActive();
        }

        function switchLanguageTo(lang) {
            sessionStorage.setItem("selectedLanguage", lang);
            renderPage();
        }

        function updateFlagActive() {
            const lang = sessionStorage.getItem("selectedLanguage") || "en";
            document.getElementById("lang-en").style.borderColor = lang === "en" ? "#ff2b2b" : "transparent";
            document.getElementById("lang-fr").style.borderColor = lang === "fr" ? "#ff2b2b" : "transparent";
        }

        window.addEventListener("load", () => {
            loadRaidPage();
            document.getElementById("lang-fr").onclick = () => switchLanguageTo("fr");
            document.getElementById("lang-en").onclick = () => switchLanguageTo("en");
        });
    </script>
</body>
</html>
