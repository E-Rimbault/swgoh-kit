<!DOCTYPE HTML>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <title id="page-title">Mandalorien</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Rimbault Enzo">
  <link rel="icon" type="image/png" href="../image/logo_star_wars.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #031952;
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Conteneur du Tableau */
    .table-container {
      background-color: #ffffff;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      overflow-x: auto;
    }

    .table {
      margin-bottom: 0;
      vertical-align: middle;
      color: #212529;
    }

    /* Nom Unité (Noir sur Blanc) */
    .unit-link {
      color: #212529 !important;
      font-weight: 700;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .unit-link:hover {
      color: #0d6efd !important;
    }

    .unit-img-table {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border-radius: 4px;
    }

    /* Sidebar de Filtres */
    .filter-sidebar {
      background-color: rgba(255, 255, 255, 0.1);
      padding: 25px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
    }

    .form-label {
      font-weight: 600;
      color: #0d6efd;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    .form-control, .form-select {
      background-color: #f8f9fa;
      border: 2px solid transparent;
      transition: 0.3s;
    }

    .form-control:focus, .form-select:focus {
      border-color: #0d6efd;
      box-shadow: none;
    }

    /* Liens et Badges */
    .role { color: #198754; font-weight: 600; text-decoration: none; }
    .role:hover { text-decoration: underline; }

    .alignment { font-weight: bold; text-decoration: none; }
    .alignment.lightside { color: #0d6efd; }
    .alignment.darkside { color: #dc3545; }
    .alignment.neutral { color: #6c757d; }
    
    .badge-faction {
      background-color: #495057;
      color: #fff;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      margin: 2px;
      display: inline-block;
      text-decoration: none;
      transition: 0.2s;
    }

    .badge-faction:hover {
      background-color: #0d6efd;
      color: white;
    }

    .flag-switcher {
      display: flex;
      justify-content: end;
      gap: 15px;
      padding: 15px;
    }

    .flag-switcher img {
      width: 32px;
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 4px;
      transition: 0.2s;
    }

    .btn-return-container {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    #filter-title {
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
  </style>
</head>

<body>

  <div class="flag-switcher">
    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Flag_of_France.svg" alt="FR" onclick="switchLanguage('fr')">
    <img src="https://upload.wikimedia.org/wikipedia/en/a/a4/Flag_of_the_United_States.svg" alt="EN" onclick="switchLanguage('en')">
  </div>

  <div class="container-fluid px-lg-5">
    <div class="row">
      <div class="col-lg-3 col-md-4 mb-4">
        <div class="filter-sidebar">
          <h4 id="sidebar-title" class="mb-4">Options</h4>
          
          <div class="mb-4">
            <label id="label-search" class="form-label">Recherche</label>
            <input type="text" id="searchInput" class="form-control" placeholder="..." onkeyup="renderUnits()">
          </div>

          <div class="mb-4">
            <label id="label-role" class="form-label">Rôle</label>
            <select id="roleFilter" class="form-select" onchange="renderUnits()"></select>
          </div>

          <div class="btn-return-container text-center">
            <p id="txt-return" class="mb-2" style="font-size: 0.85rem;">Retour</p>
            <a href="../filtre-recherche/filtre-personnage.html">
              <img src="../image/logo_star_wars.png" alt="Logo" style="width: 80px;">
            </a>
          </div>
        </div>
      </div>

      <div class="col-lg-9 col-md-8">
        <h2 id="filter-title" class="mb-4 d-flex align-items-center flex-wrap">Mandalorian Characters</h2>
        
        <div class="table-container">
          <table class="table table-hover">
            <thead class="table-dark">
              <tr id="table-head"></tr>
            </thead>
            <tbody id="characters-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const translations = {
      en: {
        "page-title": "Mandalorian",
        "filter-title": "Characters with tag: Mandalorian",
        "sidebar-title": "Filters",
        "label-search": "Search Character",
        "label-role": "Filter by Role",
        "opt-all": "All Roles",
        "txt-return": "Main Menu",
        "table-head": ["Unit", "Role", "Alignment", "Factions"],
        "count-suffix": "results"
      },
      fr: {
        "page-title": "Mandalorien",
        "filter-title": "Personnages avec le tag : Mandalorien",
        "sidebar-title": "Filtres",
        "label-search": "Rechercher un personnage",
        "label-role": "Filtrer par rôle",
        "opt-all": "Tous les rôles",
        "txt-return": "Menu Principal",
        "table-head": ["Unité", "Rôle", "Alignement", "Factions"],
        "count-suffix": "résultats"
      }
    };

    let currentLang = "fr";
    let allUnits = [], factionsMap = [], rolesMap = [], alignmentsMap = [];

    // Chargement initial
    window.addEventListener("load", () => {
      Promise.all([
        fetch("../filtre-recherche/units.json").then(res => res.json()),
        fetch("../data/faction.json").then(res => res.json()),
        fetch("../data/roles.json").then(res => res.json()),
        fetch("../data/alignements.json").then(res => res.json())
      ]).then(([units, factions, roles, alignments]) => {
        allUnits = units;
        factionsMap = factions;
        rolesMap = roles;
        alignmentsMap = alignments;
        
        const savedLang = sessionStorage.getItem("selectedLanguage") || "fr";
        switchLanguage(savedLang);
      }).catch(err => console.error("Erreur Data Load:", err));
    });

    function switchLanguage(lang) {
      // Sauvegarde de l'index du filtre rôle avant changement
      const roleSelect = document.getElementById("roleFilter");
      const savedRoleIndex = roleSelect.selectedIndex;

      currentLang = lang;
      sessionStorage.setItem("selectedLanguage", lang);

      // Mise à jour des textes
      document.getElementById("page-title").innerText = translations[lang]["page-title"];
      document.getElementById("sidebar-title").innerText = translations[lang]["sidebar-title"];
      document.getElementById("label-search").innerText = translations[lang]["label-search"];
      document.getElementById("label-role").innerText = translations[lang]["label-role"];
      document.getElementById("txt-return").innerText = translations[lang]["txt-return"];

      const headRow = document.getElementById("table-head");
      headRow.innerHTML = translations[lang]["table-head"].map(t => `<th>${t}</th>`).join('');

      // Gestion visuelle des drapeaux
      const flags = document.querySelectorAll(".flag-switcher img");
      flags.forEach(f => f.style.border = "2px solid transparent");
      if (lang === 'fr') flags[0].style.border = "2px solid #0d6efd";
      else flags[1].style.border = "2px solid #0d6efd";

      // Reconstruction du filtre et restauration de la position
      populateRoleFilter();
      if (savedRoleIndex !== -1) roleSelect.selectedIndex = savedRoleIndex;

      renderUnits();
    }

    function populateRoleFilter() {
      const select = document.getElementById("roleFilter");
      
      const rawRoles = allUnits.map(u => u.role?.[currentLang] || u.role?.en).filter(Boolean);
      const cleanRoles = [...new Set(rawRoles.map(r => 
        r.trim().charAt(0).toUpperCase() + r.trim().slice(1).toLowerCase()
      ))].sort((a, b) => a.localeCompare(b, currentLang));

      select.innerHTML = `<option value="all">${translations[currentLang]["opt-all"]}</option>`;
      cleanRoles.forEach(r => {
        select.innerHTML += `<option value="${r.toLowerCase()}">${r}</option>`;
      });
    }

    function getAlignmentClass(alignment) {
      const val = alignment.toLowerCase();
      if (val.includes("light") || val.includes("lumineux")) return "lightside";
      if (val.includes("dark") || val.includes("obscur")) return "darkside";
      return "neutral";
    }

    function normalize(str) {
      return str ? str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim() : '';
    }

    function findMapping(mapArray, name) {
      return mapArray.find(m => normalize(m.en) === normalize(name) || normalize(m.fr) === normalize(name));
    }

    function renderUnits() {
      const tbody = document.getElementById("characters-table-body");
      const searchTerm = normalize(document.getElementById("searchInput").value);
      
      const roleSelect = document.getElementById("roleFilter");
      const selectedRoleText = roleSelect.options[roleSelect.selectedIndex]?.text.toLowerCase();
      const allRolesLabel = translations[currentLang]["opt-all"].toLowerCase();

      const factionTag = (currentLang === "fr") ? "mandalorien" : "mandalorian";

      tbody.innerHTML = "";

      let filtered = allUnits.filter(unit => {
        // Tag Faction
        const unitFactions = unit.factions || [];
        const isMando = unitFactions.some(f => normalize(f[currentLang] || f.en) === normalize(factionTag));
        
        // Nom
        const name = normalize(unit.name?.[currentLang] || unit.name?.en || "");
        
        // Rôle (Comparaison par texte pour la synchro langue)
        const unitRole = (unit.role?.[currentLang] || unit.role?.en || "").toLowerCase();
        const matchesRole = (selectedRoleText === allRolesLabel || unitRole === selectedRoleText);

        return isMando && name.includes(searchTerm) && matchesRole;
      });

      // Tri
      filtered.sort((a, b) => {
        const nameA = (a.name?.[currentLang] || a.name?.en || "").toLowerCase();
        const nameB = (b.name?.[currentLang] || b.name?.en || "").toLowerCase();
        return nameA.localeCompare(nameB, currentLang);
      });

      document.getElementById("filter-title").innerHTML = `${translations[currentLang]["filter-title"]} <span class="badge bg-primary ms-3">${filtered.length} ${translations[currentLang]["count-suffix"]}</span>`;

      filtered.forEach(unit => {
        const name = unit.name?.[currentLang] || unit.name?.en || "";
        const roleText = unit.role?.[currentLang] || unit.role?.en || "";
        const alignText = unit.alignment?.[currentLang] || unit.alignment?.en || "";
        
        const rMap = findMapping(rolesMap, roleText);
        const aMap = findMapping(alignmentsMap, alignText);

        const row = document.createElement("tr");
        row.innerHTML = `
          <td>
            <a href="${unit.page || '#'}" class="unit-link">
              <img src="${unit.image || '../image/default.png'}" class="unit-img-table">
              <span>${name}</span>
            </a>
          </td>
          <td>${rMap?.url ? `<a href="${rMap.url}" class="role">${roleText}</a>` : `<span class="role opacity-50">${roleText}</span>`}</td>
          <td>${aMap?.url ? `<a href="${aMap.url}" class="alignment ${getAlignmentClass(alignText)}">${alignText}</a>` : `<span class="${getAlignmentClass(alignText)}">${alignText}</span>`}</td>
          <td>
            ${(unit.factions || []).map(f => {
              const fName = f[currentLang] || f.en;
              const fMap = findMapping(factionsMap, fName);
              return `<a href="${fMap?.url || '#'}" class="badge-faction">${fName}</a>`;
            }).join("")}
          </td>
        `;
        tbody.appendChild(row);
      });
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
