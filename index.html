<!DOCTYPE html>
<html lang="en">
<head>
    <title>STAR WARS SWGOH - Fan Website</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="author" content="Rimbault Enzo">
    <meta name="copyright" content="© 2025 Rimbault Enzo">

    <meta name="description" content="Site dédié au jeu Star Wars Galaxy of Heroes : informations sur les personnages, vaisseaux, filtres de recherche et ressources utiles.">
    <meta name="keywords" content="Star Wars, Galaxy of Heroes, SWGOH, personnages, vaisseaux, filtres, guides, stats, jeu mobile, EA, CG">
    <meta name="robots" content="index, follow">
    <meta name="language" content="fr,en">
    <meta name="theme-color" content="#000000">

    <link rel="canonical" href="https://e-rimbault.github.io/swgoh-kit/">
    <link rel="sitemap" type="application/xml" title="Sitemap" href="sitemap.xml">

    <meta property="og:title" content="Star Wars Galaxy of Heroes - Fan Website">
    <meta property="og:description" content="Accédez aux personnages, vaisseaux and filtres de recherche du jeu SWGOH.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://e-rimbault.github.io/swgoh-kit/">
    <meta property="og:image" content="https://e-rimbault.github.io/swgoh-kit/image/logo_star_wars.png">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Star Wars Galaxy of Heroes - Fan Website">
    <meta name="twitter:description" content="Informations, filtres et ressources sur SWGOH.">
    <meta name="twitter:image" content="https://e-rimbault.github.io/swgoh-kit/image/logo_star_wars.png">

    <link rel="icon" type="image/png" href="image/logo_star_wars.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            text-align: center;
        }

        /* Background */
        .background-image {
            position: fixed;
            inset: 0;
            background-image: url("swgoh-10ans-2025.png");
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Header */
        header {
            font-size: 2.2rem;
            font-weight: bold;
            padding: 40px 10px 10px;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
        }

        /* Language switch */
        .language-switcher {
            position: absolute;
            top: 15px;
            right: 20px;
            z-index: 10;
        }

        .language-switcher img {
            width: 32px;
            cursor: pointer;
            margin-left: 8px;
            border-radius: 4px;
            transition: transform .2s;
        }

        .language-switcher img:hover {
            transform: scale(1.1);
        }

        /* Architecture à 3 Colonnes Principales */
        .three-column-layout {
            display: grid;
            grid-template-columns: 33.33% 33.33% 33.33%;
            max-width: 1450px;
            margin: auto;
            padding: 10px 20px 40px;
            box-sizing: border-box;
            gap: 20px;
            align-items: start;
        }

        /* Colonnes indépendantes contenant des blocs */
        .main-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Style des blocs individuels (Sous-sections réduites de 5%) */
        .section-block {
            background: rgba(10, 15, 20, 0.8);
            padding: 21px;
            border-radius: 11px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(0, 191, 255, 0.15);
            transition: transform .2s, box-shadow .2s, border-color .2s;
            box-sizing: border-box;
        }

        .section-block:hover {
            transform: translateY(-3px);
            border-color: rgba(0, 191, 255, 0.4);
            box-shadow: 0 4px 15px rgba(0, 191, 255, 0.12);
        }

        .section-block h3 {
            margin-top: 0;
            margin-bottom: 11px;
            font-size: 1.18rem;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .section-block a {
            color: #00bfff;
            text-decoration: none;
            font-weight: bold;
            transition: color .2s;
        }

        .section-block a:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        /* Séparateur en pointillés */
        .section-divider {
            border: none;
            border-top: 1px dashed rgba(255, 255, 255, 0.15);
            margin: 13px 0 9px 0;
        }

        /* Sous-titre de section */
        .section-subtitle {
            text-align: left;
            font-size: 0.8rem;
            font-weight: bold;
            color: #00bfff;
            letter-spacing: 0.5px;
            margin-bottom: 9px;
            text-transform: uppercase;
        }

        /* --- STYLES DES LISTES DEROULANTES MODULES --- */
        .dynamic-scroll-list {
            display: flex;
            flex-direction: column;
            gap: 9px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 6px;
        }

        .dynamic-scroll-list::-webkit-scrollbar {
            width: 4px;
        }
        .dynamic-scroll-list::-webkit-scrollbar-thumb {
            background: rgba(0, 191, 255, 0.4);
            border-radius: 2px;
        }
        .dynamic-scroll-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Éléments Communs News & Unités */
        .news-item, .unit-item-link {
            background: rgba(255, 255, 255, 0.03);
            padding: 11px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
            text-decoration: none;
            transition: background .2s, border-color .2s;
            box-sizing: border-box;
        }

        .unit-item-link {
            color: inherit;
        }

        .unit-item-link:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(0, 191, 255, 0.3);
        }

        .news-left, .unit-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .unit-left-content {
            display: flex;
            align-items: center;
            gap: 11px;
        }

        .unit-avatar {
            width: 42px;
            height: 42px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .news-item-title-link {
            font-size: 0.9rem;
            font-weight: bold;
            color: #00bfff;
            text-decoration: none;
            transition: color .2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .unit-item-name {
            font-size: 0.9rem;
            font-weight: bold;
            color: #ffffff;
            transition: text-decoration .2s;
        }

        .unit-item-link:hover .unit-item-name {
            text-decoration: underline;
        }

        .news-item-title-link:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        .news-item-author {
            font-size: 0.8rem;
            color: #a1a1aa;
        }

        .news-item-date, .unit-item-date {
            font-size: 0.8rem;
            color: #8ad8ff;
            font-weight: bold;
            white-space: nowrap;
        }

        .date-relative {
            color: #a1a1aa;
            font-weight: normal;
        }

        .main-link-margin {
            display: inline-block;
            margin-bottom: 5px;
            font-size: 0.95rem;
        }

        /* --- STYLES COMPACTS MODULE CURRENT ERA --- */
        .current-era-container {
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.01);
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
        }

        .current-era-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 12px;
            font-weight: bold;
            color: #00bfff;
            font-size: 0.95rem;
        }

        .current-era-icon {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .current-era-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-height: 260px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .current-era-grid::-webkit-scrollbar {
            width: 4px;
        }
        .current-era-grid::-webkit-scrollbar-thumb {
            background: rgba(0, 191, 255, 0.3);
            border-radius: 2px;
        }

        .era-unit-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 10px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: inherit;
            transition: background .2s, border-color .2s, transform .2s;
        }

        .era-unit-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(0, 191, 255, 0.3);
            transform: scale(1.02);
        }

        .era-unit-avatar {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .era-unit-name {
            font-size: 0.75rem;
            color: #ffffff;
            font-weight: bold;
            line-height: 1.2;
            text-align: center;
            word-break: break-word;
        }

        .era-unit-card:hover .era-unit-name {
            text-decoration: underline;
        }

        /* --- STYLES COMPACTS MODULE RAID (CAPTURE ÉCRAN) --- */
        .featured-raid-container {
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.01);
            border-radius: 8px;
            padding: 16px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .featured-raid-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: inherit;
            transition: transform .2s;
            width: 100%;
        }

        .featured-raid-card:hover {
            transform: scale(1.02);
        }

        .featured-raid-image {
            max-width: 65px; /* Taille réduite pour correspondre à l'image */
            height: auto;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .featured-raid-name {
            font-size: 1.05rem;
            font-weight: bold;
            color: #00bfff;
            transition: text-decoration .2s;
        }

        .featured-raid-card:hover .featured-raid-name {
            text-decoration: underline;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .three-column-layout {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .three-column-layout {
                grid-template-columns: 1fr;
                padding: 10px 15px;
            }
            header {
                font-size: 1.6rem;
                padding: 50px 10px 10px;
            }
            .language-switcher {
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>

<body>

<div class="background-image"></div>

<div class="language-switcher">
    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Flag_of_France.svg" alt="Français" onclick="switchLanguage('fr')">
    <img src="https://upload.wikimedia.org/wikipedia/en/a/a4/Flag_of_the_United_States.svg" alt="English" onclick="switchLanguage('en')">
</div>

<header id="title">Star Wars Galaxy of Heroes Website</header>

<div class="three-column-layout">

    <!-- PREMIÈRE GRANDE SECTION -->
    <div class="main-column">
        <!-- Character -->
        <div class="section-block">

            <div id="shipList" class="dynamic-scroll-list"></div>

    </div>

    <!-- DEUXIÈME GRANDE SECTION -->
    <div class="main-column">
        <!-- Raid -->
        <div class="section-block">
            <h3 id="raid-title">Raid</h3>
            <a href="raid/raid.html" id="raid-link" class="main-link-margin">Raid Dashboard</a>
            <hr class="section-divider">

            <div class="featured-raid-container" id="featuredRaidContainer">
                <!-- Rempli dynamiquement -->
            </div>
        </div>

        <!-- Era -->
        <div class="section-block">
            <h3 id="era-title">Era</h3>
            <a href="filtre-recherche/filtre-era.html" id="era-link" class="main-link-margin">Era List</a>

            <div class="current-era-container">
                <div class="current-era-banner" id="currentEraHeader"></div>
                <div class="current-era-grid" id="currentEraGrid"></div>

    <!-- TROISIÈME GRANDE SECTION -->
    <div class="main-column">
        <!-- Buff / Debuff -->
        <div class="section-block">
            <h3 id="effect-title">Buff / Debuff</h3>
            <a href="filtre-recherche/filtre-effet.html" id="effect-link">Effects Database</a>
        </div>

        <!-- Latest News -->
        <div class="section-block">
            <h3 id="news-section-title">Latest News</h3>
            <div id="newsList" class="dynamic-scroll-list"></div>
        </div>

        <!-- Game -->
        <div class="section-block">
            <h3 id="game-title">Game</h3>
            <a href="game/jeux.html" id="game-link">Game SWGOH Mini-games</a>
        </div>
    </div>

</div>

<script>
const translations = {
    en: {
        "title": "Star Wars Galaxy of Heroes Website",
        "character-title": "Character",
        "character-link": "Character Filter",
        "latest-units-subtitle": "Latest Units",
        "ship-title": "Ship",
        "ship-link": "Ships Filter",
        "latest-ships-subtitle": "Latest Ships",
        "era-title": "Era",
        "era-link": "Era List",
        "current-era-subtitle": "Current Era",
        "effect-title": "Buff / Debuff",
        "effect-link": "Effects Database",
        "news-section-title": "Latest News",
        "game-title": "Game",
        "game-link": "Game SWGOH Mini-games",
        "raid-title": "Raid",
        "raid-link": "Raid Dashboard",
        "featured-raid-subtitle": "Featured Raid",
        "loading": "Loading...",
        "error-news": "Error loading news",
        "error-units": "Error loading units",
        "error-ships": "Error loading ships",
        "error-eras": "Error loading eras",
        "error-raids": "Error loading raids",
        "by": "by",
        "days-ago": "days ago",
        "in-days": "In {x} days",
        "today": "Today"
    },
    fr: {
        "title": "Site Web Star Wars : Galaxy of Heroes",
        "character-title": "Personnages",
        "character-link": "Filtre Personnages",
        "latest-units-subtitle": "Dernières Unités",
        "ship-title": "Vaisseaux",
        "ship-link": "Filtre Vaisseaux",
        "latest-ships-subtitle": "Derniers Vaisseaux",
        "era-title": "Ere",
        "era-link": "Liste des Ères",
        "current-era-subtitle": "Ère Actuelle",
        "effect-title": "Bonus / Malus",
        "effect-link": "Base des Effets",
        "news-section-title": "Actualités",
        "game-title": "Jeu",
        "game-link": "Mini-jeux SWGOH",
        "raid-title": "Raid",
        "raid-link": "Tableau de Bord des Raids",
        "featured-raid-subtitle": "Raid Vedette",
        "loading": "Chargement...",
        "error-news": "Erreur lors du chargement des actualités",
        "error-units": "Erreur lors du chargement des unités",
        "error-ships": "Erreur lors du chargement des vaisseaux",
        "error-eras": "Erreur lors du chargement des ères",
        "error-raids": "Erreur lors du chargement des raids",
        "by": "par",
        "days-ago": "il y a {x} jours",
        "in-days": "Dans {x} jours",
        "today": "Aujourd'hui"
    }
};

let currentLang = "en";
let globalNewsData = [];
let globalUnitsData = [];
let globalShipsData = [];
let globalErasData = [];
let globalRaidsData = [];

window.onload = () => {
    currentLang = sessionStorage.getItem("selectedLanguage") || "en";
    switchLanguage(currentLang);
    loadNewsData();
    loadShipsData();
    loadUnitsData(); 
    loadRaidsData();
};

function switchLanguage(lang) {
    currentLang = lang;
    sessionStorage.setItem("selectedLanguage", lang);

    document.querySelectorAll("[id]").forEach(el => {
        if (translations[lang] && translations[lang][el.id]) {
            el.textContent = translations[lang][el.id];
        }
    });

    if (globalNewsData.length > 0) renderNews(globalNewsData);
    if (globalUnitsData.length > 0) renderUnits(globalUnitsData);
    if (globalShipsData.length > 0) renderShips(globalShipsData);
    if (globalErasData.length > 0 && globalUnitsData.length > 0) renderCurrentEra(globalErasData, globalUnitsData);
    if (globalRaidsData.length > 0) renderFeaturedRaid(globalRaidsData);
}

function processReleaseDate(dateString) {
    if (!dateString) return { html: '', isRelative: false };
    
    const parts = dateString.trim().split('-');
    if (parts.length !== 3) return { html: dateString, isRelative: false };

    const today = new Date(2026, 6, 20); 
    const releaseDate = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));

    const diffTime = today - releaseDate;
    const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

    if (diffDays >= -7 && diffDays <= 7) {
        if (diffDays === 0) {
            return { html: `<span class="date-relative">${translations[currentLang]['today']}</span>`, isRelative: true };
        } else if (diffDays > 0) {
            let text = translations[currentLang]['days-ago'].replace('{x}', diffDays);
            if (currentLang === 'en') text = `${diffDays} days ago`; 
            return { html: `<span class="date-relative">${text}</span>`, isRelative: true };
        } else {
            let text = translations[currentLang]['in-days'].replace('{x}', Math.abs(diffDays));
            return { html: `<span class="date-relative">${text}</span>`, isRelative: true };
        }
    }

    const options = { month: 'long', day: '2-digit', year: 'numeric' };
    const formattedDate = releaseDate.toLocaleDateString(currentLang === 'fr' ? 'fr-FR' : 'en-US', options);
    return { html: formattedDate, isRelative: false };
}

/* --- MODULE PERSONNAGES --- */
function loadUnitsData() {
    const unitContainer = document.getElementById('unitList');
    if (unitContainer) unitContainer.innerHTML = `<div style="font-size:11px; color:#aaa;">${translations[currentLang]['loading']}</div>`;

    fetch('https://e-rimbault.github.io/swgoh-kit/filtre-recherche/units.json')
        .then(response => response.json())
        .then(data => {
            data.sort((a, b) => {
                const partsA = (a.release_date || "1970-01-01").trim().split('-');
                const partsB = (b.release_date || "1970-01-01").trim().split('-');
                const timeA = new Date(parseInt(partsA[0], 10), parseInt(partsA[1], 10) - 1, parseInt(partsA[2], 10)).getTime();
                const timeB = new Date(parseInt(partsB[0], 10), parseInt(partsB[1], 10) - 1, parseInt(partsB[2], 10)).getTime();
                return timeB - timeA;
            });
            globalUnitsData = data;
            renderUnits(data);
            loadErasData();
        })
        .catch(error => {
            console.error("Erreur unités:", error);
            if (unitContainer) unitContainer.innerHTML = `<div style="font-size:11px;color:#ff4444;">${translations[currentLang]['error-units']}</div>`;
        });
}

function renderUnits(unitsData) {
    const unitContainer = document.getElementById('unitList');
    if (!unitContainer) return;
    unitContainer.innerHTML = '';

    const top15Units = unitsData.slice(0, 15);

    top15Units.forEach(unit => {
        const name = unit.name[currentLang] || unit.name['en'] || 'Unknown';
        const pageLink = unit.page || '#';
        const imgUrl = unit.image || '';
        const dateObj = processReleaseDate(unit.release_date);

        const unitHtml = `
            <a href="${pageLink}" class="unit-item-link">
                <div class="unit-left-content">
                    <img src="${imgUrl}" class="unit-avatar" alt="${name}" onerror="this.style.display='none';">
                    <div class="unit-left">
                        <div class="unit-item-name">${name}</div>
                        <div class="unit-item-date">${dateObj.html}</div>
                    </div>
                </div>
            </a>
        `;
        unitContainer.insertAdjacentHTML('beforeend', unitHtml);
    });
}

/* --- MODULE VAISSEAUX --- */
function loadShipsData() {
    const shipContainer = document.getElementById('shipList');
    if (shipContainer) shipContainer.innerHTML = `<div style="font-size:11px; color:#aaa;">${translations[currentLang]['loading']}</div>`;

    fetch('https://e-rimbault.github.io/swgoh-kit/filtre-recherche/ship.json')
        .then(response => response.json())
        .then(data => {
            data.sort((a, b) => {
                const partsA = (a.release_date || "1970-01-01").trim().split('-');
                const partsB = (b.release_date || "1970-01-01").trim().split('-');
                const timeA = new Date(parseInt(partsA[0], 10), parseInt(partsA[1], 10) - 1, parseInt(partsA[2], 10)).getTime();
                const timeB = new Date(parseInt(partsB[0], 10), parseInt(partsB[1], 10) - 1, parseInt(partsB[2], 10)).getTime();
                return timeB - timeA;
            });
            globalShipsData = data;
            renderShips(data);
        })
        .catch(error => {
            console.error("Erreur vaisseaux:", error);
            if (shipContainer) shipContainer.innerHTML = `<div style="font-size:11px;color:#ff4444;">${translations[currentLang]['error-ships']}</div>`;
        });
}

function renderShips(shipsData) {
    const shipContainer = document.getElementById('shipList');
    if (!shipContainer) return;
    shipContainer.innerHTML = '';

    const top15Ships = shipsData.slice(0, 15);

    top15Ships.forEach(ship => {
        const name = ship.name[currentLang] || ship.name['en'] || 'Unknown';
        const pageLink = ship.page || '#';
        const imgUrl = ship.image || '';
        const dateObj = processReleaseDate(ship.release_date);

        const shipHtml = `
            <a href="${pageLink}" class="unit-item-link">
                <div class="unit-left-content">
                    <img src="${imgUrl}" class="unit-avatar" alt="${name}" onerror="this.style.display='none';">
                    <div class="unit-left">
                        <div class="unit-item-name">${name}</div>
                        <div class="unit-item-date">${dateObj.html}</div>
                    </div>
                </div>
            </a>
        `;
        shipContainer.insertAdjacentHTML('beforeend', shipHtml);
    });
}

/* --- MODULE RAIDS --- */
function loadRaidsData() {
    const raidContainer = document.getElementById('featuredRaidContainer');
    if (raidContainer) raidContainer.innerHTML = `<div style="font-size:11px; color:#aaa;">${translations[currentLang]['loading']}</div>`;

    // 1. On charge la page HTML des raids
    fetch('https://e-rimbault.github.io/swgoh-kit/raid/raid.html')
        .then(response => response.text())
        .then(htmlText => {
            // 2. On analyse le HTML reçu
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            
            // 3. On cherche toutes les balises <script> pour trouver celle qui contient vos données de raids
            const scripts = doc.querySelectorAll('script');
            let raidsData = null;

            scripts.forEach(script => {
                const content = script.textContent;
                // On cherche un indice textuel de votre tableau (ex: "Krayt Dragon Hunt" ou la structure de l'objet)
                if (content && content.includes('Krayt Dragon Hunt')) {
                    try {
                        // Extraction magique : on isole ce qui ressemble à un tableau JSON [ ... ] 
                        // autour du mot clé trouvé dans le script
                        const match = content.match(/\[\s*\{\s*id[\s\S]*?\}\s*\]/);
                        if (match) {
                            // On nettoie et transforme la chaîne JS en JSON valide
                            // (remplace les clés sans guillemets par des clés valides si nécessaire)
                            let jsonString = match[0]
                                .replace(/([{,]\s*)([a-zA-Z0-9_]+)\s*:/g, '$1"$2":') // ajoute des guillemets aux clés
                                .replace(/'/g, '"') // remplace les apostrophes par des guillemets
                                .replace(/,\s*\]/g, ']'); // enlève la virgule traînante s'il y en a une

                            raidsData = JSON.parse(jsonString);
                        }
                    } catch (e) {
                        console.error("Erreur lors de l'extraction des raids du script :", e);
                    }
                }
            });

            // 4. Si on a trouvé les données, on les traite !
            if (raidsData && raidsData.length > 0) {
                globalRaidsData = raidsData;
                renderFeaturedRaid(raidsData);
            } else {
                throw new Error("Données de raid introuvables dans le HTML");
            }
        })
        .catch(error => {
            console.error("Erreur raids:", error);
            if (raidContainer) raidContainer.innerHTML = `<div style="font-size:11px;color:#ff4444;">${translations[currentLang]['error-raids']}</div>`;
        });
}

function renderFeaturedRaid(raidsData) {
    const raidContainer = document.getElementById('featuredRaidContainer');
    if (!raidContainer || raidsData.length === 0) return;

    // Tri pour trouver l'id le plus élevé (raid vedette)
    const sortedRaids = [...raidsData].sort((a, b) => b.id - a.id);
    const featuredRaid = sortedRaids[0];

    const name = featuredRaid.name[currentLang] || featuredRaid.name['en'] || 'Unknown Raid';
    const imgUrl = featuredRaid.image || '';
    const pageUrl = featuredRaid.url ? `https://e-rimbault.github.io/swgoh-kit/raid/${featuredRaid.url}` : '#';

    raidContainer.innerHTML = `
        <a href="${pageUrl}" class="featured-raid-card">
            <img src="${imgUrl}" class="featured-raid-image" alt="${name}" onerror="this.style.display='none';">
            <div class="featured-raid-name">${name}</div>
        </a>
    `;
}

/* --- MODULE ERAS --- */
function loadErasData() {
    const headerContainer = document.getElementById('currentEraHeader');
    if (headerContainer) headerContainer.innerHTML = `<span style="font-size:11px; color:#aaa;">${translations[currentLang]['loading']}</span>`;

    fetch('https://e-rimbault.github.io/swgoh-kit/filtre-recherche/eras.json')
        .then(response => response.json())
        .then(data => {
            globalErasData = data;
            renderCurrentEra(data, globalUnitsData);
        })
        .catch(error => {
            console.error("Erreur ères:", error);
            if (headerContainer) {
                headerContainer.innerHTML = `<span style="color:#ff4444; font-size:11px;">${translations[currentLang]['error-eras']}</span>`;
            }
        });
}

function renderCurrentEra(erasData, unitsData) {
    const headerContainer = document.getElementById('currentEraHeader');
    const gridContainer = document.getElementById('currentEraGrid');
    if (!headerContainer || !gridContainer) return;

    const currentEra = erasData.find(e => e.current === true) || erasData.find(e => String(e.name_en).toLowerCase().includes('new republic')) || erasData[0];
    if (!currentEra) {
        headerContainer.innerHTML = '';
        return;
    }

    const eraName = currentLang === 'fr' ? (currentEra.name_fr || currentEra.name_en) : (currentEra.name_en || currentEra.name_fr);
    const eraImage = currentEra.image || '';

    headerContainer.innerHTML = `
        <img src="${eraImage}" class="current-era-icon" alt="" onerror="this.style.display='none';">
        <span>${eraName}</span>
    `;

    gridContainer.innerHTML = '';
    
    const filteredUnits = unitsData.filter(unit => {
        if (!unit.era || !unit.era.en || !currentEra.name_en) return false;
        return unit.era.en.trim().toLowerCase() === currentEra.name_en.trim().toLowerCase();
    });

    if (filteredUnits.length === 0) {
        gridContainer.innerHTML = `<div style="grid-column: span 3; font-size:11px; color:#aaa; padding:10px;">No units found</div>`;
        return;
    }

    filteredUnits.forEach(unit => {
        const uName = unit.name[currentLang] || unit.name['en'] || 'Unknown';
        const uImg = unit.image || '';
        const uPage = unit.page || '#';

        const cardHtml = `
            <a href="${uPage}" class="era-unit-card">
                <img src="${uImg}" class="era-unit-avatar" alt="${uName}" onerror="this.parentNode.style.display='none';">
                <div class="era-unit-name">${uName}</div>
            </a>
        `;
        gridContainer.insertAdjacentHTML('beforeend', cardHtml);
    });
}

/* --- MODULE NEWS --- */
function loadNewsData() {
    const newsContainer = document.getElementById('newsList');
    if(newsContainer) newsContainer.innerHTML = `<div style="font-size:11px; color:#aaa;">${translations[currentLang]['loading']}</div>`;

    fetch('https://e-rimbault.github.io/swgoh-kit/filtre-recherche/new.json')
        .then(response => response.json())
        .then(data => {
            data.sort((a, b) => b.id - a.id);
            globalNewsData = data;
            renderNews(data);
        })
        .catch(error => {
            console.error("Erreur news:", error);
            if(newsContainer) newsContainer.innerHTML = `<div style="font-size:11px;color:#ff4444;">${translations[currentLang]['error-news']}</div>`;
        });
}

function formatNewsDate(dateString) {
    if (!dateString) return '';
    const parts = dateString.trim().split('-');
    if (parts.length !== 3) return dateString;

    const dateObj = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
    const options = { month: 'long', day: '2-digit', year: 'numeric' };
    return dateObj.toLocaleDateString(currentLang === 'fr' ? 'fr-FR' : 'en-US', options);
}

function renderNews(newsData) {
    const newsContainer = document.getElementById('newsList');
    if (!newsContainer) return;
    newsContainer.innerHTML = '';

    const top15News = newsData.slice(0, 15);

    top15News.forEach(news => {
        const title = news.title || 'No Title';
        const link = news.link || '#';
        const author = news.author || 'Unknown';
        const formattedDate = formatNewsDate(news.news_date);

        const newsHtml = `
            <div class="news-item">
                <div class="news-left">
                    <a href="${link}" target="_blank" class="news-item-title-link">
                        ${title} 🔗
                    </a>
                    <span class="news-item-author">${translations[currentLang]['by']} ${author}</span>
                </div>
                <div class="news-item-date">${formattedDate}</div>
            </div>
        `;
        newsContainer.insertAdjacentHTML('beforeend', newsHtml);
    });
}
</script>
